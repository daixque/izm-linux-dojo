lesson:
  chapter: "09_shell_basics"
  chapter_number: "09"
  number: "02"
  id: "09_shell_basics/02_tab_complete"
  title: "コマンドとパスを Tab で補完する"

content: |
  <h2>入力を自動で補完する</h2>
  <p>コマンド名やファイル名は長いことがあり、全部を正確に打つのは大変です。Tab キーを押すと、シェルが<strong>入力途中の文字列を自動で補完</strong>してくれます。</p>
  <p>第1章でも Tab を使ったことがあれば、同じ操作です。ここではコマンド名とパスの補完を整理して見ていきます。</p>

  <h2>コマンド名の補完</h2>
  <p>コマンドの最初の数文字を入力して Tab を押すと、候補が 1 つに決まれば自動で残りが補完されます。</p>
  <pre><code>$ gr[Tab]  →  grep</code></pre>
  <p>上の例では <code>gr</code> と入力したあと Tab を押すと、<code>grep</code> に補完されます（<code>grep</code> だけが候補の場合）。</p>

  <h2>パスの補完</h2>
  <p>ディレクトリ名やファイル名も Tab で補完できます。</p>
  <pre><code>$ cd doc[Tab]  →  cd documents/</code></pre>
  <p>ディレクトリの場合、末尾に <code>/</code> が付くことがあります。これは「フォルダの中に入る」という目印です。</p>

  <h2>候補が複数あるとき</h2>
  <p>Tab を 2 回押すと、入力に一致する候補の一覧が表示されることがあります。目的の名前を確認してから、もう少し文字を入力して Tab を押すと絞り込めます。</p>

  <h2>次のステップ</h2>
  <p>演習ページで Tab を使って <code>documents</code> ディレクトリに移動してみましょう！</p>
