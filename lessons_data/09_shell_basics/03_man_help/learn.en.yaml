lesson:
  chapter: "09_shell_basics"
  chapter_number: "09"
  number: "03"
  id: "09_shell_basics/03_man_help"
  title: "Looking Up Command Documentation"

content: |
  <h2>Look It Up Yourself</h2>
  <p>Linux has many commands, and you do not need to memorize all of them. When you are unsure how something works, get in the habit of checking the <strong>help</strong>.</p>

  <h2>The <code>--help</code> Option</h2>
  <p>Many commands show a brief description with <code>--help</code>.</p>
  <pre><code>$ ls --help
  Usage: ls [OPTION]... [FILE]...
  List directory contents.
  ...</code></pre>

  <h2>The <code>man</code> Command</h2>
  <p><code>man</code> (manual) displays a command's <strong>manual page</strong>. On real Linux you can read detailed documentation.</p>
  <pre><code>$ man ls</code></pre>
  <p>The dojo simulator also includes manual pages for major commands.</p>

  <h2>What to Remember</h2>
  <ul>
    <li>Try <code>command --help</code> first</li>
    <li>Use <code>man command</code> when you want more detail</li>
  </ul>

  <h2>Next Step</h2>
  <p>On the exercise page, try <code>ls --help</code> and <code>man grep</code>!</p>
