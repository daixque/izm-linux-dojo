initial_filesystem:
  /home/user:
    type: directory
    children:
      notes.txt:
        type: file
        content: 'memo

          '
      work:
        type: directory
        children: {}

initial_cwd: /home/user

solution_commands:
  - "pwd"
  - "ls"

tests:
  - name: "pwd is correct"
    description: "Verify current directory"
    type: command_output
    command: "pwd"
    expected_output: |
      /home/user
  - name: "ls works"
    description: "File listing"
    type: command_output
    command: "ls"
    expected_output: |
      notes.txt
      work
