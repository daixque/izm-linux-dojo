lesson:
  chapter: "09_shell_basics"
  chapter_number: "09"
  number: "01"
  id: "09_shell_basics/01_history"
  title: "過去のコマンドを再利用する"

content: |
  <h2>ターミナルとシェル</h2>
  <p>第0章で使ってきた<strong>ターミナル</strong>は、文字だけの画面そのものです。あなたの入力を受け取り、結果を表示する<strong>入出力の窓口</strong>にあたります。</p>
  <p>ターミナルの背後で、入力された文字列を読み取り、コンピューターに命令を伝えるプログラムが動いています。これを<strong>シェル</strong>（shell）と呼びます。</p>

  <h2>シェルがすること</h2>
  <p><kbd>Enter</kbd> を押すと、シェルは次の流れで動きます。</p>
  <ol>
    <li>入力された文字列（コマンド）を読み取る</li>
    <li>ワイルドカードを実際のファイル名に置き換える</li>
    <li>命令に対応するプログラム（<code>ls</code> や <code>grep</code> など）を探して実行する</li>
    <li>実行結果をターミナル画面に表示する</li>
  </ol>
  <p>たとえば <code>ls *.txt</code> と入力すると、シェルが先に <code>*</code> や <code>?</code> などのワイルドカードを <code>notes.txt readme.txt</code> のように展開してから <code>ls</code> を実行します（第7章で学んだ展開）。ワイルドカードの展開も、<code>ls</code> などのコマンドではなく<strong>シェルの仕事</strong>です。</p>
  <p>第0章から <code>ls</code> や <code>cd</code> を打ってきたとき、画面に結果が出るまでを担当していたのがシェルです。ターミナルは「画面」、シェルは「命令を処理するプログラム」と覚えておきましょう。</p>
  <p>シェルは命令の実行だけでなく、入力を助ける機能も持っています。ここでは、過去に打ったコマンドを呼び出す<strong>履歴</strong>を見ていきます。</p>

  <h2>打ったコマンドを呼び出す</h2>
  <p>ターミナルでコマンドを実行すると、シェルはその内容を<strong>履歴</strong>として記録します。長いコマンドを毎回打ち直す必要がなくなります。</p>
  <p><kbd>↑</kbd>（上矢印）キーを押すと、以前に実行したコマンドが 1 つずつ表示されます。第1章で触れた操作を、ここではもう少し詳しく見ていきます。</p>

  <h2>履歴とは</h2>
  <p>Enter キーで実行したコマンドは、古いものから新しいものまで順番に保存されます。同じコマンドを何度も使うときや、少しだけ内容を変えたいときに便利です。</p>

  <h2>↑ と ↓ キー</h2>
  <table>
    <thead>
      <tr><th>キー</th><th>動き</th></tr>
    </thead>
    <tbody>
      <tr><td><kbd>↑</kbd></td><td>1 つ前のコマンドを表示する（さらに押すと、さらに古いコマンドへ）</td></tr>
      <tr><td><kbd>↓</kbd></td><td>1 つ新しいコマンドへ進む（↑ で戻ったあとに使う）</td></tr>
    </tbody>
  </table>

  <h2>活用のコツ</h2>
  <ul>
    <li>同じコマンドを何度も実行するときは ↑ で呼び出して Enter</li>
    <li>少しだけ変えたいときは ↑ で呼び出してから、必要な部分を編集して Enter</li>
  </ul>

  <h2>次のステップ</h2>
  <p>演習ページでは、いくつかコマンドを実行したあと ↑ キーで履歴を呼び出してみましょう！</p>
