  id: "09_shell_basics/01_history"
  title: "Reusing Previous Commands"

content: |
  <h2>Recall Commands You Typed</h2>
  <p>When you started using the terminal in Chapter 1, you may have noticed that the <kbd>↑</kbd> key brings back previous commands. Here we formally cover <strong>command history</strong>.</p>

  <h2>What Is History?</h2>
  <p>The shell records commands you run after pressing Enter as <strong>history</strong>. You do not need to retype long commands every time.</p>

  <h2>↑ and ↓ Keys</h2>
  <ul>
    <li><kbd>↑</kbd> — show the previous command (press again for older ones)</li>
    <li><kbd>↓</kbd> — move toward newer commands (use after going back with ↑)</li>
  </ul>

  <h2>Tips</h2>
  <ul>
    <li>When running the same command repeatedly, press ↑ and Enter</li>
    <li>When you need a small change, press ↑, edit, then Enter</li>
  </ul>

  <h2>This Dojo's Terminal</h2>
  <p>The IZM Linux Dojo exercise terminal also supports ↑↓ keys. Try them on the exercise page.</p>

  <h2>Next Step</h2>
  <p>On the exercise page, run a few commands and try recalling them with ↑!</p>
