lesson:
  chapter: "09_shell_basics"
  chapter_number: "09"
  number: "01"
  id: "09_shell_basics/01_history"
  title: "Command History"

description: "Practice command history with ↑↓ keys."

task_description: |
  <p>Run a few commands, recall them with <kbd>↑</kbd>, and rerun. Tests verify <code>pwd</code> and <code>ls</code> work correctly.</p>

instructions:
  - "Run <code>pwd</code>"
  - "Run <code>ls</code>"
  - "Press <kbd>↑</kbd> to recall <code>ls</code> and press Enter to rerun"
  - "Click the <strong>Test</strong> button when ready"

hints:
  - "Press ↑ multiple times for older commands"
  - "Only commands executed with Enter are recorded"
