initial_filesystem:
  /home/user:
    type: directory
    children:
      documents:
        type: directory
        children:
          readme.txt:
            type: file
            content: 'hello

              '

initial_cwd: /home/user

solution_commands:
  - "cd documents && ls"
  - "cd /home/user"

tests:
  - name: "cd && ls works"
    description: "Chained command result"
    type: command_sequence
    steps:
      - command: "cd documents && ls"
        expected_output: |
          readme.txt
        expected_cwd: "/home/user/documents"
  - name: "Semicolon chaining works"
    description: "pwd; ls execution"
    type: command_output
    command: "pwd; ls"
    expected_output: |
      /home/user
      documents
