initial_filesystem:
  /home/user:
    type: directory
    children: {}

initial_cwd: /home/user

solution_commands:
  - "echo $HOME"
  - "echo $USER"

tests:
  - name: "HOME が表示される"
    description: "echo $HOME の出力"
    type: command_output
    command: "echo $HOME"
    expected_output: |
      /home/user
  - name: "USER が表示される"
    description: "echo $USER の出力"
    type: command_output
    command: "echo $USER"
    expected_output: |
      user
