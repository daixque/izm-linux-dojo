initial_filesystem:
  /home/user:
    type: directory
    children: {}

initial_cwd: /home/user

solution_commands:
  - ps

tests:
  - name: "ps shows the process list"
    description: "Verify fixed ps output"
    type: command_output
    command: ps
    expected_output: "  PID TTY          TIME CMD\n    1 ?           00:00:01 systemd\n 1042 pts/0       00:00:00 bash\n 2048 pts/0       00:00:02 python simulator.py\n 3099 pts/0       00:00:00 sleep 100\n"
