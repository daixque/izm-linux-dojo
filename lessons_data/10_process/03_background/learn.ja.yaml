lesson:
  chapter: "10_process"
  chapter_number: "10"
  number: "03"
  id: "10_process/03_background"
  title: "フォアグラウンドとバックグラウンド"

content: |
  <h2>2 つの動き方</h2>
  <p>ターミナルでコマンドを実行すると、通常はそのコマンドが終わるまで<strong>待つ</strong>必要があります。これを<strong>フォアグラウンド</strong>（foreground）で動かす、と言います。前面で仕事をしているイメージです。</p>
  <p>一方、コマンドの末尾に <code>&</code> を付けると、コマンドを<strong>バックグラウンド</strong>（background）で動かせます。ターミナルはすぐに使える状態に戻り、裏で処理が続きます。</p>
  <pre><code>$ sleep 100 &
  [1] 3099</code></pre>
  <p><code>[1]</code> はジョブ番号、<code>3099</code> はそのプロセスの PID です。</p>

  <h2><code>jobs</code> — バックグラウンドの仕事を確認</h2>
  <p>裏で動いている仕事を確認するには、<code>jobs</code> コマンドを使います。道場のシミュレータでは、次のような固定出力が表示されます。</p>
  <pre><code>$ jobs
  [1]+ Running    sleep 100 &</code></pre>
  <p><code>[1]</code> はジョブ番号、<code>Running</code> は実行中であることを示します。</p>

  <h2><code>fg</code> — 前面に戻す</h2>
  <p><code>fg</code>（foreground）は、バックグラウンドで動いていたジョブを再び前面に戻すコマンドです。前面に戻すと、またそのコマンドの終了を待つ状態になります。道場では完全な再現はしませんが、サーバー管理などで「裏で動かしていた処理を前面で確認する」場面で使われます。</p>

  <h2>いつ使う？</h2>
  <ul>
    <li>時間のかかる処理を裏で走らせ、ターミナルで別の作業を続けたいとき</li>
    <li>サーバープログラムを起動したまま、他のコマンドを打ちたいとき</li>
  </ul>

  <h2>次のステップ</h2>
  <p>演習では <code>jobs</code> を実行し、バックグラウンドジョブの表示を確認します。</p>
