initial_filesystem:
  /home/user:
    type: directory
    children: {}

initial_cwd: /home/user

solution_commands:
  - jobs
  - ps

tests:
  - name: "jobs shows background job"
    description: "Verify fixed jobs output"
    type: command_output
    command: jobs
    expected_output: "[1]+ Running sleep 100 &\n"

  - name: "ps also shows sleep"
    description: "Cross-check with ps"
    type: command_output
    command: ps
    expected_output: "  PID TTY          TIME CMD\n    1 ?           00:00:01 systemd\n 1042 pts/0       00:00:00 bash\n 2048 pts/0       00:00:02 python simulator.py\n 3099 pts/0       00:00:00 sleep 100\n"
