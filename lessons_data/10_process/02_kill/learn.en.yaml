  number: "02"
  id: "10_process/02_kill"
  title: "Stopping Running Programs"

content: |
  <h2>Why Stop a Process?</h2>
  <p>In the previous lesson you used <code>ps</code> to see running processes and their PIDs. Sometimes you need to stop a process that is no longer needed or keeps running by mistake.</p>
  <p>On Linux, the <code>kill</code> command sends a <strong>signal</strong> to a process with a given PID — telling it to stop.</p>

  <h2>What Is a Signal?</h2>
  <p>A signal is a message from the OS to a process — "exit now," "pause," and so on. For now, remember that <code>kill PID</code> means "stop the process with this PID."</p>

  <h2>Basic <code>kill</code></h2>
  <pre><code>$ kill 3099</code></pre>
  <p>This tells PID <code>3099</code> (the <code>sleep 100</code> process) to exit. On success, nothing is usually printed.</p>
  <p>Run <code>ps</code> again and the stopped process will no longer appear.</p>

  <h2>Cautions</h2>
  <table>
    <thead>
      <tr><th>Situation</th><th>Result</th></tr>
    </thead>
    <tbody>
      <tr><td>Non-existent PID specified</td><td>Error</td></tr>
      <tr><td>Important processes like <code>systemd</code> (PID 1)</td><td>Cannot be stopped</td></tr>
      <tr><td>Before stopping in production</td><td>Confirm it is truly unnecessary</td></tr>
    </tbody>
  </table>

  <h2>Next Step</h2>
  <p>On the exercise page, run <code>kill 3099</code> to stop <code>sleep 100</code>, then verify with <code>ps</code>.</p>
