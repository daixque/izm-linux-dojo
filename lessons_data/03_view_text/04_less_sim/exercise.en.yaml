lesson:
  chapter: "03_view_text"
  chapter_number: "03"
  number: "04"
  id: "03_view_text/04_less_sim"
  title: "Long Files"

description: "Use head and tail to inspect parts of a long story.txt file."

task_description: |
  <p><code>story.txt</code> is a very long file. Instead of <code>cat</code>ing the whole thing, inspect only what you need:</p>
  <ul>
    <li><code>head -n 3 story.txt</code> — the opening 3 lines</li>
    <li><code>tail -n 3 story.txt</code> — the final 3 lines</li>
  </ul>

instructions:
  - "Optionally run <code>wc -l story.txt</code> to see total line count"
  - "Run <code>head -n 3 story.txt</code> to show the beginning"
  - "Run <code>tail -n 3 story.txt</code> to show the ending"
  - "When ready, click the <strong>Test</strong> button"

hints:
  - "Reading part of a long file with head/tail is a core skill"
  - "<code>less</code> pages through files on real Linux; here we use head/tail"
  - "Use the <strong>Reset</strong> button to start over if needed"
