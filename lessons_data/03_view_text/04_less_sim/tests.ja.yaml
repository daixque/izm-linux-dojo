initial_filesystem:
  /home/user:
    type: directory
    children:
      story.txt:
        type: file
        content: |
          The Adventure Begins
          Chapter 1: The Terminal
          Once upon a time, a student opened a terminal.
          Line 04: Learning ls and cd every day.
          Line 05: Learning ls and cd every day.
          Line 06: Learning ls and cd every day.
          Line 07: Learning ls and cd every day.
          Line 08: Learning ls and cd every day.
          Line 09: Learning ls and cd every day.
          Line 10: Learning ls and cd every day.
          Line 11: Learning ls and cd every day.
          Line 12: Learning ls and cd every day.
          Line 13: Learning ls and cd every day.
          Line 14: Learning ls and cd every day.
          Line 15: Learning ls and cd every day.
          Line 16: Learning ls and cd every day.
          Line 17: Learning ls and cd every day.
          Line 18: Learning mkdir and touch next.
          Line 19: Files were created and organized.
          The End
          They became a Linux master.

initial_cwd: /home/user

solution_commands:
  - head -n 3 story.txt
  - tail -n 3 story.txt

tests:
  - name: "冒頭 3 行が表示される"
    description: "head -n 3 の出力を確認"
    type: command_output
    command: head -n 3 story.txt
    expected_output: |
      The Adventure Begins
      Chapter 1: The Terminal
      Once upon a time, a student opened a terminal.

  - name: "末尾 3 行が表示される"
    description: "tail -n 3 の出力を確認"
    type: command_output
    command: tail -n 3 story.txt
    expected_output: |
      Line 19: Files were created and organized.
      The End
      They became a Linux master.

  - name: "長いファイルの部分読み"
    description: "head と tail の組み合わせ"
    type: command_sequence
    steps:
      - command: head -n 3 story.txt
        expected_output: |
          The Adventure Begins
          Chapter 1: The Terminal
          Once upon a time, a student opened a terminal.
      - command: tail -n 3 story.txt
        expected_output: |
          Line 19: Files were created and organized.
          The End
          They became a Linux master.
