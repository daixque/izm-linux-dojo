lesson:
  chapter: "03_view_text"
  chapter_number: "03"
  number: "04"
  id: "03_view_text/04_less_sim"
  title: "長いファイルの必要な部分を読む"

description: "長い story.txt から head と tail で必要な部分だけ確認します。"

task_description: |
  <p><code>story.txt</code> はとても長いファイルです。<code>cat</code> ですべて表示するのではなく、次の操作で必要な部分だけ確認しましょう。</p>
  <ul>
    <li><code>head -n 3 story.txt</code> で冒頭 3 行（タイトル部分）を見る</li>
    <li><code>tail -n 3 story.txt</code> で末尾 3 行（結末部分）を見る</li>
  </ul>

instructions:
  - "<code>wc -l story.txt</code> で全体の行数を確認してもよいでしょう（任意）"
  - "<code>head -n 3 story.txt</code> で冒頭を表示します"
  - "<code>tail -n 3 story.txt</code> で結末を表示します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "長いファイルは head/tail で部分的に読むのが基本テクニックです"
  - "<code>less</code> は本物の Linux ではページ送りできますが、この演習では head/tail を使います"
  - "うまくいかないときは <strong>リセット</strong> ボタンで最初からやり直せます"
