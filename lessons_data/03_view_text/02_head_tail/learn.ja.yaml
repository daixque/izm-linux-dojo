lesson:
  chapter: "03_view_text"
  chapter_number: "03"
  number: "02"
  id: "03_view_text/02_head_tail"
  title: "先頭・末尾"

content: |
  <h2>長いファイルの一部だけ見る</h2>
  <p><code>cat</code> はファイル全体を表示します。ログファイルのように行数が多いファイルでは、全部を表示しても画面からあふれてしまい、必要な部分を見つけにくくなります。</p>
  <p>そんなときは、<strong>先頭</strong>や<strong>末尾</strong>の数行だけを取り出して確認する方法が便利です。</p>

  <h2><code>head</code> — 先頭を表示する</h2>
  <p><code>head</code> は、ファイルの<strong>最初の方</strong>の行を表示します。何も指定しなければ 10 行です。</p>
  <pre><code>$ head server.log
  2024-01-01 INFO Server started
  2024-01-01 INFO Listening on port 8080
  ...</code></pre>
  <p>ファイルの書式や項目名を確認したいときによく使います。</p>

  <h3>行数を指定する — <code>head -n</code></h3>
  <p><code>-n</code> オプションで、表示する行数を変えられます。</p>
  <pre><code>$ head -n 5 server.log</code></pre>
  <p>先頭 5 行だけが表示されます。</p>

  <h2><code>tail</code> — 末尾を表示する</h2>
  <p><code>tail</code> は、ファイルの<strong>最後の方</strong>の行を表示します。ログの最新の記録を確認するときによく使います。</p>
  <pre><code>$ tail server.log
  ...
  2024-01-04 INFO Goodbye</code></pre>
  <p>何も指定しなければ、末尾 10 行が表示されます。</p>

  <h3>行数を指定する — <code>tail -n</code></h3>
  <pre><code>$ tail -n 3 server.log</code></pre>
  <p>末尾 3 行だけが表示されます。</p>

  <h2>使い分けの例</h2>
  <ul>
    <li><strong>ファイルの形式を知りたい</strong> → <code>head</code> で先頭数行を見る</li>
    <li><strong>最新の記録を確認したい</strong> → <code>tail</code> で末尾数行を見る</li>
  </ul>
  <p>たとえばログファイルなら、<code>head</code> で項目の並びを確認し、<code>tail</code> で直近のエラーやメッセージを確認する、という使い方が現場でもよくあります。</p>

  <h2>次のステップ</h2>
  <p>演習ページで、ログファイルの先頭 5 行と末尾 3 行を表示してみましょう。</p>
