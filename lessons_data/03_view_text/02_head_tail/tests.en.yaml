initial_filesystem:
  /home/user:
    type: directory
    children:
      server.log:
        type: file
        content: |
          2024-01-01 INFO Server started
          2024-01-01 INFO Listening on port 8080
          2024-01-01 DEBUG Config loaded
          2024-01-02 WARN Low memory
          2024-01-02 ERROR Connection failed
          2024-01-03 INFO User login
          2024-01-03 INFO Request processed
          2024-01-03 ERROR Disk full
          2024-01-04 INFO Shutdown
          2024-01-04 INFO Goodbye

initial_cwd: /home/user

solution_commands:
  - head -n 5 server.log
  - tail -n 3 server.log

tests:
  - name: "First 5 lines displayed"
    description: "Verify head -n 5 output"
    type: command_output
    command: head -n 5 server.log
    expected_output: |
      2024-01-01 INFO Server started
      2024-01-01 INFO Listening on port 8080
      2024-01-01 DEBUG Config loaded
      2024-01-02 WARN Low memory
      2024-01-02 ERROR Connection failed

  - name: "Last 3 lines displayed"
    description: "Verify tail -n 3 output"
    type: command_output
    command: tail -n 3 server.log
    expected_output: |
      2024-01-03 ERROR Disk full
      2024-01-04 INFO Shutdown
      2024-01-04 INFO Goodbye

  - name: "head and tail together"
    description: "Both commands work correctly"
    type: command_sequence
    steps:
      - command: head -n 5 server.log
        expected_output: |
          2024-01-01 INFO Server started
          2024-01-01 INFO Listening on port 8080
          2024-01-01 DEBUG Config loaded
          2024-01-02 WARN Low memory
          2024-01-02 ERROR Connection failed
      - command: tail -n 3 server.log
        expected_output: |
          2024-01-03 ERROR Disk full
          2024-01-04 INFO Shutdown
          2024-01-04 INFO Goodbye
