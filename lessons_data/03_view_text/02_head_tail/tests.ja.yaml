initial_filesystem:
  /home/user:
    type: directory
    children:
      server.log:
        type: file
        content: |
          2024-01-01 INFO Server started
          2024-01-01 INFO Listening on port 8080
          2024-01-01 DEBUG Config loaded
          2024-01-02 WARN Low memory
          2024-01-02 ERROR Connection failed
          2024-01-03 INFO User login
          2024-01-03 INFO Request processed
          2024-01-03 ERROR Disk full
          2024-01-04 INFO Shutdown
          2024-01-04 INFO Goodbye

initial_cwd: /home/user

solution_commands:
  - head -n 5 server.log
  - tail -n 3 server.log

tests:
  - name: "先頭 5 行が表示される"
    description: "head -n 5 の出力を確認"
    type: command_output
    command: head -n 5 server.log
    expected_output: |
      2024-01-01 INFO Server started
      2024-01-01 INFO Listening on port 8080
      2024-01-01 DEBUG Config loaded
      2024-01-02 WARN Low memory
      2024-01-02 ERROR Connection failed

  - name: "末尾 3 行が表示される"
    description: "tail -n 3 の出力を確認"
    type: command_output
    command: tail -n 3 server.log
    expected_output: |
      2024-01-03 ERROR Disk full
      2024-01-04 INFO Shutdown
      2024-01-04 INFO Goodbye

  - name: "head と tail の組み合わせ"
    description: "両方のコマンドが正しく動くか"
    type: command_sequence
    steps:
      - command: head -n 5 server.log
        expected_output: |
          2024-01-01 INFO Server started
          2024-01-01 INFO Listening on port 8080
          2024-01-01 DEBUG Config loaded
          2024-01-02 WARN Low memory
          2024-01-02 ERROR Connection failed
      - command: tail -n 3 server.log
        expected_output: |
          2024-01-03 ERROR Disk full
          2024-01-04 INFO Shutdown
          2024-01-04 INFO Goodbye
