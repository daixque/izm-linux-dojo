lesson:
  chapter: "03_view_text"
  chapter_number: "03"
  number: "03"
  id: "03_view_text/03_wc"
  title: "ファイルの行数や語数を数える"

content: |
  <h2>ファイルの「量」を数える</h2>
  <p>テキストファイルは、中身を読むだけでなく「何行あるか」「どれくらいの長さか」も知りたい場面があります。レポートの行数を数えたり、ログがどれだけ増えたか調べたりするときに便利です。</p>
  <p>Linux では <code>wc</code>（word count）というコマンドで、ファイルの量を数えられます。</p>

  <h2><code>wc -l</code> — 行数を数える</h2>
  <p><code>-l</code> オプション（line＝行）で、ファイルの<strong>行数</strong>を数えます。</p>
  <pre><code>$ wc -l essay.txt
  3 essay.txt</code></pre>
  <p>左側の数字が行数です。この例では 3 行あります。改行で区切られた 1 かたまりが 1 行として数えられます。</p>

  <h2><code>wc -w</code> — 語数を数える</h2>
  <p><code>-w</code> オプション（word＝語）で、空白で区切られた<strong>単語の数</strong>を数えます。</p>
  <pre><code>$ wc -w essay.txt
  8 essay.txt</code></pre>
  <p>英語の文章では単語数、日本語では空白の有無によって数え方が変わることがあります。</p>

  <h2><code>wc -c</code> — バイト数を数える</h2>
  <p><code>-c</code> オプション（character / byte＝文字・バイト）で、ファイルの<strong>サイズ（バイト数）</strong>を数えます。英字中心の短いテキストでは、おおよそ文字数に近い値になります。</p>
  <pre><code>$ wc -c essay.txt
  52 essay.txt</code></pre>

  <h2>よく使うオプションのまとめ</h2>
  <table>
    <thead>
      <tr><th>オプション</th><th>数えるもの</th></tr>
    </thead>
    <tbody>
      <tr><td><code>-l</code></td><td>行数</td></tr>
      <tr><td><code>-w</code></td><td>語数（空白区切りのかたまり）</td></tr>
      <tr><td><code>-c</code></td><td>バイト数（ファイルサイズ）</td></tr>
    </tbody>
  </table>
  <p>オプションを付けない <code>wc</code> は、行数・語数・バイト数をまとめて表示します。まずは <code>-l</code> から覚えておけば十分です。</p>

  <h2>次のステップ</h2>
  <p>演習ページで <code>wc -l</code> を使い、ファイルの行数を数えてみましょう。</p>
