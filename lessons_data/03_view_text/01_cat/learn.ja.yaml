lesson:
  chapter: "03_view_text"
  chapter_number: "03"
  number: "01"
  id: "03_view_text/01_cat"
  title: "cat で表示"

content: |
  <h2>ファイルの中身を読む</h2>
  <p>第2章までで、ファイルやフォルダの<strong>作成・コピー・移動・削除</strong>を学びました。ここからは、ファイルの<strong>中身（テキスト）</strong>をターミナルで読む方法を学びます。</p>
  <p>Linux では多くの設定ファイルやログがテキスト形式で保存されています。中身を確認できると、トラブル調査や設定の理解に役立ちます。</p>

  <h2><code>cat</code> — ファイル全体を表示</h2>
  <p><code>cat</code>（concatenate）は、ファイルの内容をそのまま画面に表示するコマンドです。短いテキストファイルをざっと見るときに使います。</p>
  <pre><code>$ cat messages.txt
  Hello!
  Welcome to Linux Dojo.</code></pre>
  <p>ファイル名を引数に指定します。</p>
  <pre><code>cat ファイル名</code></pre>

  <h2>複数ファイルを続けて表示</h2>
  <p>ファイル名を複数指定すると、順番に内容が表示されます。</p>
  <pre><code>$ cat part1.txt part2.txt</code></pre>

  <h2>長いファイルには向かない</h2>
  <p><code>cat</code> はファイル<strong>全体</strong>を一度に表示します。行数がとても多いファイル（ログなど）では、画面からあふれて読みにくくなります。長いファイルの扱い方は、この章の後半（<code>head</code>・<code>tail</code> や <code>less</code> の概念）で学びます。</p>

  <h2>第1章との組み合わせ</h2>
  <p><code>cd</code> でファイルがあるディレクトリに移動してから <code>cat ファイル名</code> するか、パスを指定して <code>cat documents/readme.txt</code> のように実行できます。</p>

  <h2>次のステップ</h2>
  <p>演習ページで <code>cat</code> を使い、指定ファイルの内容を表示してみましょう！</p>
