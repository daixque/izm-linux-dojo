initial_filesystem:
  /home/user:
    type: directory
    children:
      messages.txt:
        type: file
        content: |
          Hello!
          Welcome to IZM Linux Dojo.
          This is a text file.
      notes.txt:
        type: file
        content: "other file\n"

initial_cwd: /home/user

solution_commands:
  - cat messages.txt

tests:
  - name: "cat displays messages.txt correctly"
    description: "Verify cat output"
    type: command_output
    command: cat messages.txt
    expected_output: |
      Hello!
      Welcome to IZM Linux Dojo.
      This is a text file.

  - name: "messages.txt exists"
    description: "Check ls shows the file"
    type: command_output
    command: ls
    expected_output: "messages.txt\nnotes.txt\n"
