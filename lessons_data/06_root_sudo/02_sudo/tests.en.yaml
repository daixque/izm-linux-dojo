initial_filesystem:
  /home/user:
    type: directory
    children:
      notes.txt:
        type: file
        content: "memo\n"
  /root:
    type: directory
    owner: root
    group: root
    mode: 700
    children:
      secret.txt:
        type: file
        content: "root's secret\n"
        owner: root
        group: root
        mode: 600

initial_cwd: /home/user

solution_commands:
  - sudo ls /root

tests:
  - name: "sudo ls /root succeeds"
    description: "list /root with root privileges"
    type: command_output
    command: sudo ls /root
    expected_output: "secret.txt\n"

  - name: "plain ls /root fails"
    description: "Permission denied without sudo"
    type: command_output
    command: ls /root
    expected_output: ""
    expected_stderr: "ls: cannot open directory '/root': Permission denied\n"
    expected_exit_code: 1
