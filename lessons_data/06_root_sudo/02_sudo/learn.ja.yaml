lesson:
  chapter: "06_root_sudo"
  chapter_number: "06"
  number: "02"
  id: "06_root_sudo/02_sudo"
  title: "sudo とは"

content: |
  <h2>root の権限を一時的に借りる</h2>
  <p>普通のユーザーは root の領域（<code>/root</code> など）にアクセスできません。でも、管理者の作業が必要なときがあります。</p>
  <p><code>sudo</code>（"superuser do"）は、<strong>一時的に root として</strong>コマンドを実行する仕組みです。本物の Linux ではパスワードを求められますが、この道場ではパスワードなしでシミュレーションします。</p>

  <h2>使い方</h2>
  <pre><code>$ ls /root
  ls: cannot open directory '/root': Permission denied

  $ sudo ls /root
  secret.txt
  backup/</code></pre>
  <p><code>sudo</code> の後に、普通のコマンドをそのまま書きます。1 回のコマンドだけ root 権限で実行され、終わるとまた普通のユーザーに戻ります。</p>

  <h2>注意点</h2>
  <ul>
    <li><strong>必要なときだけ</strong>使う — 日常のファイル操作に sudo は不要</li>
    <li>間違えてシステムファイルを壊すと、PC 全体に影響する</li>
    <li>macOS でも「管理者パスワード」を求める場面が sudo に近い</li>
  </ul>

  <h2>次のステップ</h2>
  <p>演習ページで <code>sudo ls /root</code> を試し、通常は見えない <code>/root</code> の中身を表示してみましょう！</p>
