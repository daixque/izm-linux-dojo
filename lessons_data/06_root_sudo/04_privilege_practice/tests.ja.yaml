initial_filesystem:
  /home/user:
    type: directory
    children:
      shared:
        type: directory
        owner: root
        group: root
        mode: 755
        children:
          data.txt:
            type: file
            content: "shared data\n"
            owner: root
            group: root
            mode: 600

initial_cwd: /home/user

solution_commands:
  - cd shared
  - sudo chown user data.txt
  - sudo chmod 664 data.txt
  - ls -l data.txt

tests:
  - name: "shared に移動"
    description: "cd shared の確認"
    type: cwd
    commands:
      - cd shared
    expected_cwd: /home/user/shared

  - name: "data.txt のオーナーが user、権限が 664"
    description: "chown + chmod 後の ls -l"
    type: command_output
    setup_commands:
      - cd shared
      - sudo chown user data.txt
      - sudo chmod 664 data.txt
    command: ls -l data.txt
    expected_output: "-rw-rw-r-- 1 user root   12 Jan  1 10:00 data.txt\n"

  - name: "設定後に cat できる"
    description: "共有ファイルを読める"
    type: command_output
    setup_commands:
      - cd shared
      - sudo chown user data.txt
      - sudo chmod 664 data.txt
    command: cat data.txt
    expected_output: "shared data\n"
