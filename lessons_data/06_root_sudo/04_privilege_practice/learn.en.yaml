  id: "06_root_sudo/04_privilege_practice"
  title: "Privileged Operations Practice"

content: |
  <h2>Chapters 4–6 Summary</h2>
  <p>You have learned users, ownership, permissions, root, and sudo. In practice, you <strong>combine</strong> them.</p>

  <h2>Shared Folder Scenario</h2>
  <p>Imagine an admin setting up a <code>/shared</code> folder:</p>
  <ol>
    <li>Transfer ownership to user <code>user</code> (<code>sudo chown</code>)</li>
    <li>Set permissions so the team can read (<code>sudo chmod</code>)</li>
    <li>Verify with <code>ls -l</code></li>
  </ol>
  <pre><code>$ sudo chown user:staff /shared/data.txt
  $ sudo chmod 664 /shared/data.txt
  $ ls -l /shared/data.txt
  -rw-rw-r-- 1 user staff  ... data.txt</code></pre>

  <h2>Mindset</h2>
  <ul>
    <li>sudo is a last resort — try normal methods first</li>
    <li>Check <code>ls -l</code> before and after changes</li>
    <li>Grant the <strong>minimum</strong> permissions needed</li>
  </ul>

  <h2>Next Step</h2>
  <p>On the exercise page, set up a shared file's owner and permissions with sudo!</p>
