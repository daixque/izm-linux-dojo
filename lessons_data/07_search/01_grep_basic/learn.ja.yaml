  number: "01"
  id: "07_search/01_grep_basic"
  title: "grep の基本"

content: |
  <h2>ファイルの中から行を探す</h2>
  <p>第3章で <code>cat</code> や <code>head</code>・<code>tail</code> を使い、ファイルの<strong>中身を読む</strong>方法を学びました。ログや設定ファイルは行数が多いことがあり、必要な行だけを素早く見つけたい場面があります。</p>
  <p>たとえばエラーログでは、<code>ERROR</code> という文字列を含む行だけを取り出したい、ということがよくあります。1 行ずつ目で探すのは大変なので、<strong>文字列を含む行だけを自動で表示する</strong>仕組みがあります。</p>

  <h2><code>grep</code> とは</h2>
  <p><code>grep</code> は、ファイルの中から<strong>指定した文字列を含む行</strong>だけを取り出して表示するコマンドです。テキストファイルの検索に使います。</p>

  <h2>基本の形</h2>
  <pre><code>grep パターン ファイル名</code></pre>
  <p>「パターン」には探したい文字列を書きます。大文字と小文字は区別されます（<code>ERROR</code> と <code>error</code> は別物として扱われます）。</p>
  <pre><code>$ grep ERROR app.log
  2024-01-02 ERROR Connection failed
  2024-01-03 ERROR Disk full</code></pre>
  <p>上の例では、<code>app.log</code> の各行を調べ、<code>ERROR</code> という文字列を含む行だけが表示されています。</p>

  <h2>複数ファイルをまとめて検索</h2>
  <p>ファイル名を複数指定すると、それぞれのファイルを順番に検索します。</p>
  <pre><code>$ grep ERROR log1.txt log2.txt</code></pre>

  <h2>見つからないとき</h2>
  <p>パターンに一致する行がない場合、grep は何も表示せず終了します。これはエラーではなく、「該当する行がなかった」という結果です。</p>

  <h2>次のステップ</h2>
  <p>演習ページで <code>grep</code> を使い、ログファイルから ERROR 行を抽出してみましょう！</p>
