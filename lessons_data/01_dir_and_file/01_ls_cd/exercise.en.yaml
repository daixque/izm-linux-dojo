lesson:
  chapter: "01_dir_and_file"
  chapter_number: "01"
  number: "01"
  id: "01_dir_and_file/01_ls_cd"
  title: "Listing and Navigating Directories"

description: "Use ls and cd to explore the file hierarchy and list directory contents."

task_description: |
  <p>Apply what you learned about directory hierarchy using the terminal and the file explorer on the right. Move from the <code>user</code> folder into the <code>documents</code> subfolder and find <code>readme.txt</code> with <code>ls</code>.</p>

instructions:
  - "Run <code>pwd</code> to check your location (should be <code>/home/user</code>, your home directory)"
  - "Run <code>ls</code> and tell directories from files — <code>documents</code> vs <code>notes.txt</code>"
  - "Run <code>cd documents</code> to enter documents (like opening a folder in Finder)"
  - "Run <code>ls</code> again and confirm <code>readme.txt</code> appears"
  - "Notice how the file tree on the right updates as you move in the terminal"
  - "When ready, click the <strong>Test</strong> button"

hints:
  - "Press Enter after typing a command"
  - "Put a space after <code>cd</code> before the directory name"
  - "Use the <strong>Reset</strong> button to start over if needed"
