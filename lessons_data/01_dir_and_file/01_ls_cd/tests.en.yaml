initial_filesystem:
  /home/user:
    type: directory
    children:
      documents:
        type: directory
        children:
          readme.txt:
            type: file
            content: "Welcome to IZM Linux Dojo!\n"
      notes.txt:
        type: file
        content: "memo\n"

initial_cwd: /home/user

solution_commands:
  - cd documents
  - ls

tests:
  - name: "Moved to documents directory"
    description: "Check cd documents worked"
    type: cwd
    commands:
      - cd documents
    expected_cwd: /home/user/documents

  - name: "ls shows readme.txt"
    description: "Check ls output in documents"
    type: command_sequence
    steps:
      - command: cd documents
        expected_cwd: /home/user/documents
      - command: ls
        expected_output: "readme.txt\n"

  - name: "pwd shows current location"
    description: "Check pwd output"
    type: command_sequence
    steps:
      - command: cd documents
        expected_cwd: /home/user/documents
      - command: pwd
        expected_output: "/home/user/documents\n"
