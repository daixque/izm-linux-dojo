lesson:
  chapter: "01_dir_and_file"
  chapter_number: "01"
  number: "01"
  id: "01_dir_and_file/01_ls_cd"
  title: "フォルダの中身を見て移動する"

description: "ファイルシステムの階層を意識しながら、ls と cd でディレクトリを移動し、中身を確認します。"

task_description: |
  <p>説明で学んだ「ディレクトリの階層」を、ターミナルと右側のファイルエクスプローラーで確かめましょう。<code>user</code> フォルダから <code>documents</code> サブフォルダへ移動し、中の <code>readme.txt</code> を <code>ls</code> で見つけます。</p>

instructions:
  - "<code>pwd</code> で現在地を確認します（<code>/home/user</code> — ホームディレクトリのはず）"
  - "<code>ls</code> で一覧を表示し、<code>documents</code>（ディレクトリ）と <code>notes.txt</code>（ファイル）を見分けます"
  - "<code>cd documents</code> で documents ディレクトリに移動します（Finder でフォルダを開くのと同じ操作）"
  - "もう一度 <code>ls</code> を実行し、<code>readme.txt</code> が表示されることを確認します"
  - "右のファイルツリーがターミナルの移動と連動していることも確認してみましょう"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "コマンド入力後は Enter キーを押します"
  - "<code>cd</code> の後にスペースを入れてからディレクトリ名を入力します"
  - "うまくいかないときは <strong>リセット</strong> ボタンで最初からやり直せます"
