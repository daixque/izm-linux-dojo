content: |
  <h2>Chapter 1 — Files and Directories</h2>
  <p>In Chapter 0, you learned what the terminal and the Linux world are about. Chapter 1 starts with how Linux and macOS organize data: <strong>files</strong> and <strong>directories</strong>.</p>
  <p>Once you know what they are and how they form a hierarchy, you will learn how to inspect them from the terminal. What you see in a GUI (Finder, etc.) and what you work with in the terminal are <strong>the same file system, shown differently</strong>.</p>

  <h2>Files and Directories in the OS</h2>
  <p>Inside a computer there is storage — a hard disk, SSD, or similar device. The OS (Linux or macOS) builds a <strong>file system</strong> on that storage to organize and save data.</p>
  <p>The file system has two basic kinds of entries:</p>
  <ul>
    <li><strong>Directory</strong> — a container for organizing data. The same thing as a <strong>folder</strong> on Mac.</li>
    <li><strong>File</strong> — the actual data: text, numbers, images, program instructions, and so on.</li>
  </ul>
  <p>Every file lives inside some directory. There are no files floating outside directories.</p>

  <h2>Directories — Building a Hierarchy (Tree)</h2>
  <p>A key property of directories is that they can <strong>hold more directories and files</strong>. One folder can sit inside another, so the whole layout becomes a <strong>hierarchy</strong> — a shape like a tree, called a <strong>tree structure</strong>.</p>
  <ul>
    <li>The level above is the <strong>parent directory</strong>; the level below is a <strong>child directory</strong>.</li>
    <li>You can go as many levels deep as you need — folder inside folder inside folder…</li>
    <li>On Linux, every directory ultimately sits under a special top-level directory called <strong>root</strong>, written as <code>/</code>.</li>
  </ul>
  <p>Imagine a layout like this:</p>

  <pre class="tree"><code>/
  └── home/
      └── user/
          ├── documents/
          │   └── readme.txt
          └── notes.txt</code></pre>

  <p>Inside <code>user</code> there is a child directory <code>documents</code>, and inside that is the file <code>readme.txt</code>. At the same <code>user</code> level, <code>notes.txt</code> sits directly in <code>user</code>. This branching shape is the basic mental model of a file system.</p>

  <h2>What Is a File?</h2>
  <p>A <strong>file</strong> is a <strong>named chunk of data</strong> on the computer. Under the hood it is stored as bytes (0s and 1s), but we usually think of these kinds:</p>
  <ul>
    <li><strong>Text files</strong> — plain characters: notes, config, source code.</li>
    <li><strong>Image files</strong> — photos and graphics (JPEG, PNG, etc.).</li>
    <li><strong>Audio and video files</strong> — music and movies.</li>
    <li><strong>Programs (executables)</strong> — instructions for the computer to run. App binaries are files too.</li>
    <li><strong>Others</strong> — archives (ZIP), databases, logs, and many more formats.</li>
  </ul>
  <p>Each file has a <strong>filename</strong>. On Linux, names are case-sensitive (<code>Notes.txt</code> and <code>notes.txt</code> are different).</p>

  <h2>What Are File Extensions?</h2>
  <p>The suffix such as <code>.txt</code> or <code>.jpg</code> at the end of a filename is called an <strong>extension</strong>. It is usually a hint for humans about <strong>what kind of data</strong> the file holds.</p>
  <ul>
    <li><code>readme.txt</code> — looks like text</li>
    <li><code>photo.jpg</code> — looks like an image</li>
    <li><code>music.mp3</code> — looks like audio</li>
  </ul>
  <p>On Windows, extensions are tightly tied to file types. On <strong>Linux and macOS, extensions are convention</strong>: renaming an extension does not change the contents, and files without extensions are normal. Still, people usually keep extensions when sharing files.</p>
  <p><strong>Directories (folders) normally have no extension.</strong> <code>documents</code> is a folder name; <code>readme.txt</code> is a file name.</p>

  <h2>Seeing It in the GUI — Finder on Mac</h2>
  <p>If you use a Mac, you have opened folders and files in <strong>Finder</strong>. What Finder shows and what Linux’s file system describes are the <strong>same idea</strong>.</p>

  <table>
    <thead>
      <tr><th>In Finder (GUI)</th><th>In the terminal (CUI)</th><th>Meaning</th></tr>
    </thead>
    <tbody>
      <tr><td>Double-click a folder to open it</td><td><code>cd foldername</code></td><td>Enter that directory</td></tr>
      <tr><td>File list in the window</td><td><code>ls</code></td><td>List what is in the current directory</td></tr>
      <tr><td>Path bar (or ⌘-click the title)</td><td><code>pwd</code></td><td>Show where you are (the path)</td></tr>
      <tr><td>Folder</td><td>Directory</td><td>Container for files and other folders</td></tr>
      <tr><td>Documents, images, music, etc.</td><td>File</td><td>The actual data</td></tr>
    </tbody>
  </table>

  <p>Finder is <strong>GUI</strong> (icons and mouse); the terminal is <strong>CUI</strong> (text and keyboard). They look different, but the <strong>underlying hierarchy is the same</strong>. As in Chapter 0, the terminal is another way to do the same work precisely and quickly.</p>
  <p>On the exercise page, a <strong>file explorer</strong> (folder tree) appears on the side. When you run <code>cd</code> or <code>ls</code> in the terminal, the tree updates too. Comparing GUI and CUI side by side helps the concepts click.</p>

  <h2>Paths — Addresses for Locations</h2>
  <p>The string that says <strong>where</strong> a file or directory lives is called a <strong>path</strong>. Slashes <code>/</code> separate levels and show which folders you pass through.</p>
  <ul>
    <li><code>/home/user</code> — root <code>/</code>, then <code>home</code>, then <code>user</code></li>
    <li><code>/home/user/documents/readme.txt</code> — through <code>user</code> and <code>documents</code> to file <code>readme.txt</code></li>
  </ul>
  <p>A path starting with <code>/</code> is an <strong>absolute path</strong> from root. <strong>Relative paths</strong> (e.g. <code>documents</code>) are covered in more detail later in this chapter.</p>

  <h2>Checking with the Terminal</h2>
  <p>These three commands let you verify the ideas above in the browser’s Linux simulator:</p>
  <ul>
    <li><code>pwd</code> — print the path of the directory you are in</li>
    <li><code>ls</code> — list files and subdirectories in the current directory</li>
    <li><code>cd</code> — change to another directory</li>
  </ul>
  <p>Type commands in the terminal from Chapter 0 and press <kbd>Enter</kbd> to run them. The examples below show terminal output.</p>

  <h2>Basic Commands</h2>
  <h3><code>pwd</code> — Print Working Directory</h3>
  <p>Shows the path of your current directory — like Finder telling you which folder is open, but as text.</p>
  <pre><code>$ pwd
  /home/user</code></pre>

  <h3><code>ls</code> — List Contents</h3>
  <p>Lists what is in the current directory — like Finder’s list view.</p>
  <p>Example while in <code>/home/user</code>:</p>
  <pre><code>$ ls
  documents
  notes.txt</code></pre>
  <p><code>documents</code> is a directory; <code>notes.txt</code> is a file. The <code>.txt</code> extension suggests a text file.</p>

  <h3><code>cd</code> — Change Directory</h3>
  <p>Move into another directory — like opening a folder in Finder.</p>
  <ul>
    <li><code>cd documents</code> — into <code>documents</code> from where you are (relative path)</li>
    <li><code>cd ..</code> — up one level to the parent directory</li>
    <li><code>cd /home/user</code> — move using an absolute path</li>
  </ul>
  <p>After moving, use <code>pwd</code> to confirm where you landed.</p>

  <h2>Next Step</h2>
  <p>On the exercise page, try <code>pwd</code>, <code>ls</code>, and <code>cd</code> with the file explorer and terminal side by side. Each time you move, use <code>pwd</code> to check where you are and <code>ls</code> to see what is in that level.</p>
