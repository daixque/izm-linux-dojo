lesson:
  chapter: "01_dir_and_file"
  chapter_number: "01"
  number: "04"
  id: "01_dir_and_file/04_tree"
  title: "フォルダの階層構造を把握する"

description: "tree で構造を確認し、3 階層下の app ディレクトリまで cd します。"

task_description: |
  <p><code>tree</code> でディレクトリ構造を確認し、深い階層にある <code>projects/web/app</code> まで移動しましょう。</p>

instructions:
  - "<code>tree</code> でホームディレクトリ以下の構造を確認します"
  - "<code>tree projects</code> で projects 以下を絞り込んで見ます"
  - "<code>cd projects/web/app</code> で 3 階層下の app ディレクトリへ移動します"
  - "<code>pwd</code> で <code>/home/user/projects/web/app</code> であることを確認します"
  - "<code>ls</code> で <code>config.txt</code> があることを確認します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "<code>tree</code> は引数なしで現在のディレクトリ以下を表示します"
  - "パスは <code>projects/web/app</code> のように / でつなぎます"
  - "Tab キーでディレクトリ名を補完できます"
