lesson:
  chapter: "01_dir_and_file"
  chapter_number: "01"
  number: "04"
  id: "01_dir_and_file/04_tree"
  title: "Understanding Directory Hierarchy"

description: "Use tree to inspect the layout, then cd to the app directory three levels deep."

task_description: |
  <p>Use <code>tree</code> to inspect the directory layout, then navigate to the deep path <code>projects/web/app</code>.</p>

instructions:
  - "Run <code>tree</code> to see the layout under your home directory"
  - "Run <code>tree projects</code> to focus on the projects subtree"
  - "Run <code>cd projects/web/app</code> to reach the app directory three levels down"
  - "Run <code>pwd</code> and confirm you are at <code>/home/user/projects/web/app</code>"
  - "Run <code>ls</code> and confirm <code>config.txt</code> is listed"
  - "When ready, click the <strong>Test</strong> button"

hints:
  - "<code>tree</code> with no arguments lists everything under the current directory"
  - "Join path segments with <code>/</code>, like <code>projects/web/app</code>"
  - "Press Tab to complete directory names"
