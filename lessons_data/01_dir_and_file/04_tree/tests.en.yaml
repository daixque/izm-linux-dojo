initial_filesystem:
  /home/user:
    type: directory
    children:
      projects:
        type: directory
        children:
          web:
            type: directory
            children:
              app:
                type: directory
                children:
                  config.txt:
                    type: file
                    content: "debug=false\n"
      notes.txt:
        type: file
        content: "memo\n"

initial_cwd: /home/user

solution_commands:
  - tree
  - tree projects
  - cd projects/web/app
  - pwd
  - ls

tests:
  - name: "tree shows layout under home"
    description: "tree lists the full layout including projects and notes.txt"
    type: command_output
    setup_commands:
      - cd /home/user
    commands:
      - tree
    expected_output: |
      .
      ├── notes.txt
      └── projects/
          └── web/
              └── app/
                  └── config.txt

  - name: "tree projects shows subtree"
    description: "tree projects lists only under projects"
    type: command_output
    setup_commands:
      - cd /home/user
    commands:
      - tree projects
    expected_output: |
      projects/
      └── web/
          └── app/
              └── config.txt

  - name: "Reach app directory three levels deep"
    description: "cd projects/web/app navigates to the deep directory"
    type: cwd
    commands:
      - cd projects/web/app
    expected_cwd: /home/user/projects/web/app

  - name: "pwd shows deep path"
    description: "Check pwd output after reaching the deep directory"
    type: command_sequence
    steps:
      - command: cd projects/web/app
        expected_cwd: /home/user/projects/web/app
      - command: pwd
        expected_output: "/home/user/projects/web/app\n"

  - name: "ls shows config.txt in deep directory"
    description: "Check ls lists the file three levels down"
    type: command_sequence
    steps:
      - command: cd projects/web/app
        expected_cwd: /home/user/projects/web/app
      - command: ls
        expected_output: "config.txt\n"
