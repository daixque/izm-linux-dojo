lesson:
  chapter: "12_capstone"
  chapter_number: "12"
  number: "03"
  id: "12_capstone/03_shared_folder"
  title: "共有フォルダ整備"

description: "chmod、chown、sudo で共有ディレクトリの権限を設定します。"

task_description: |
  <p><code>/shared</code> ディレクトリを整備し、<code>user</code> が <code>team.txt</code> を作成できるようにしましょう。</p>
  <ol>
    <li><code>sudo chown user:user /shared</code> でオーナーを変更</li>
    <li><code>chmod u+rwx,go+rx /shared</code> で権限を設定</li>
    <li><code>touch /shared/team.txt</code> で共有ファイルを作成</li>
  </ol>

instructions:
  - "<code>ls -l /shared</code> で初期状態（root オーナー）を確認します"
  - "<code>sudo chown user:user /shared</code> を実行します"
  - "<code>chmod u+rwx,go+rx /shared</code> を実行します"
  - "<code>touch /shared/team.txt</code> でファイルを作成します"
  - "<code>ls /shared</code> で team.txt があることを確認します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "<code>sudo</code> は道場では自動的に root 権限として動作します"
  - "権限変更のあとに touch を試してください"
  - "うまくいかないときは <strong>リセット</strong> ボタンで最初からやり直せます"
