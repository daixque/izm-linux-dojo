lesson:
  chapter: "12_capstone"
  chapter_number: "12"
  number: "03"
  id: "12_capstone/03_shared_folder"
  title: "Shared Folder Setup"

description: "Set shared directory permissions with chmod, chown, and sudo."

task_description: |
  <p>Set up <code>/shared</code> so <code>user</code> can create <code>team.txt</code>.</p>
  <ol>
    <li><code>sudo chown user:user /shared</code> to change owner</li>
    <li><code>chmod u+rwx,go+rx /shared</code> to set permissions</li>
    <li><code>touch /shared/team.txt</code> to create a shared file</li>
  </ol>

instructions:
  - "Run <code>ls -l /shared</code> to see initial root ownership"
  - "Run <code>sudo chown user:user /shared</code>"
  - "Run <code>chmod u+rwx,go+rx /shared</code>"
  - "Run <code>touch /shared/team.txt</code>"
  - "Run <code>ls /shared</code> to confirm team.txt exists"
  - "Click <strong>Test</strong> when ready"

hints:
  - "In the dojo, <code>sudo</code> automatically grants root privileges"
  - "Try <code>touch</code> after changing permissions"
  - "Use <strong>Reset</strong> to start over if needed"
