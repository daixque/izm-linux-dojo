  number: "02"
  id: "12_capstone/02_log_analysis"
  title: "ログ分析"

content: |
  <h2>総合演習：ログ分析</h2>
  <p>第7–8章で学んだ <code>grep</code>、<code>wc</code>、パイプ（<code>|</code>）を使い、ログファイルから必要な情報を取り出します。</p>

  <h2>ログファイルとは</h2>
  <p>プログラムやサーバーは、動作の記録を<strong>ログ</strong>（log）ファイルに書き込みます。<code>INFO</code> は通常動作、<code>ERROR</code> はエラー、<code>WARN</code> は警告を表すことが多いです。</p>

  <h2>よく使う組み合わせ</h2>
  <pre><code>$ grep ERROR app.log
  $ grep ERROR app.log | wc -l</code></pre>
  <p>1 行目は ERROR 行だけを表示、2 行目は ERROR の<strong>件数</strong>を数えます。</p>

  <h2>作業の流れ</h2>
  <ol>
    <li><code>cat</code> や <code>head</code> でログの全体像を把握</li>
    <li><code>grep</code> で ERROR 行を抽出</li>
    <li>パイプで <code>wc -l</code> に渡して件数を数える</li>
  </ol>

  <h2>次のステップ</h2>
  <p>演習では <code>app.log</code> から ERROR の件数を集計します。</p>
