  id: "12_capstone/02_log_analysis"
  title: "Log Analysis"

content: |
  <h2>Capstone: Log Analysis</h2>
  <p>Use <code>grep</code>, <code>wc</code>, and pipes (<code>|</code>) from Chapters 7–8 to extract information from log files.</p>

  <h2>What is a Log File?</h2>
  <p>Programs and servers write activity records to <strong>log</strong> files. <code>INFO</code> usually means normal operation, <code>ERROR</code> means failure, and <code>WARN</code> means warning.</p>

  <h2>Common Combinations</h2>
  <pre><code>$ grep ERROR app.log
  $ grep ERROR app.log | wc -l</code></pre>
  <p>The first shows only ERROR lines; the second counts how many ERROR lines exist.</p>

  <h2>Workflow</h2>
  <ol>
    <li>Use <code>cat</code> or <code>head</code> to understand the log</li>
    <li><code>grep</code> to extract ERROR lines</li>
    <li>Pipe to <code>wc -l</code> to count them</li>
  </ol>

  <h2>Next Step</h2>
  <p>On the exercise page, count ERROR entries in <code>app.log</code>.</p>
