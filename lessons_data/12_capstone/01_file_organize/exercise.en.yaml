lesson:
  chapter: "12_capstone"
  chapter_number: "12"
  number: "01"
  id: "12_capstone/01_file_organize"
  title: "Organizing Scattered Files"

description: "Combine mkdir, cp, mv, and rm to organize files."

task_description: |
  <p>Organize the messy home directory:</p>
  <ol>
    <li>Create <code>docs</code> and <code>images</code> with <code>mkdir -p</code></li>
    <li>Move <code>report.txt</code> and <code>memo.txt</code> into <code>docs/</code></li>
    <li>Copy <code>inbox/letter.txt</code> to <code>docs/letter.txt</code></li>
    <li>Move <code>photo.jpg</code> into <code>images/</code></li>
    <li>Delete <code>old_backup.txt</code></li>
  </ol>

instructions:
  - "Run <code>ls</code> to see the starting state"
  - "Follow the steps above in order"
  - "Run <code>ls docs</code> and <code>ls images</code> to verify"
  - "Click <strong>Test</strong> when ready"

hints:
  - "<code>mv</code> removes the file from its original location"
  - "After <code>cp</code>, <code>inbox/letter.txt</code> still exists"
  - "Use <strong>Reset</strong> to start over if needed"
