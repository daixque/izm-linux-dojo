lesson:
  chapter: "12_capstone"
  chapter_number: "12"
  number: "01"
  id: "12_capstone/01_file_organize"
  title: "ファイル整理"

content: |
  <h2>この演習のゴール</h2>
  <p>散らばったファイルを目的別のフォルダに整理し、不要なファイルを片付けます。第2章で学んだ <code>mkdir</code>、<code>mv</code>、<code>cp</code>、<code>rm</code> を組み合わせて、実際の整理作業を体験します。</p>

  <h2>課題のイメージ</h2>
  <p>ホームディレクトリに散らばったファイルを、次のように整理します。</p>
  <ul>
    <li><code>mkdir -p</code> で <code>docs</code> と <code>images</code> フォルダを用意</li>
    <li><code>mv</code> でテキスト類を <code>docs/</code>、画像を <code>images/</code> へ</li>
    <li><code>cp</code> で重要ファイルのコピーを残す</li>
    <li><code>rm</code> で不要ファイルを削除</li>
  </ul>

  <h2>作業の流れ</h2>
  <ol>
    <li><code>ls</code> で現状把握</li>
    <li>フォルダ作成 → 移動・コピー → 削除</li>
    <li>再度 <code>ls</code> で結果確認</li>
  </ol>

  <h2><code>rm</code> を使うときの注意</h2>
  <p><code>rm</code> で削除したファイルは、ゴミ箱に入らず<strong>元に戻せません</strong>。削除する前に、次を確認してください。</p>
  <ul>
    <li><code>ls</code> で、本当に削除してよいファイルか</li>
    <li>ファイル名を正確に入力しているか（打ち間違いに注意）</li>
  </ul>
  <p>道場では <strong>リセット</strong> ボタンで最初からやり直せますが、本物の Linux では取り消せないので、削除は慎重に行いましょう。</p>

  <h2>次のステップ</h2>
  <p>演習ページで、散らかったファイルを指定どおりに整理してください。</p>
