lesson:
  chapter: "12_capstone"
  chapter_number: "12"
  number: "04"
  id: "12_capstone/04_final_dojo"
  title: "Final Dojo Challenge"

description: "Comprehensive capstone combining core curriculum commands."

task_description: |
  <p>Final challenge — complete these steps in order:</p>
  <ol>
    <li><code>mkdir -p project/logs</code> to create folders</li>
    <li><code>cp server.log project/logs/</code> to copy the log</li>
    <li><code>grep ERROR project/logs/server.log > project/errors.txt</code> to save ERROR lines</li>
    <li><code>wc -l project/errors.txt</code> to count lines (should be 2)</li>
    <li><code>echo "Project complete" > project/README.txt</code> to create README</li>
  </ol>

instructions:
  - "Run <code>ls</code> and confirm <code>server.log</code> exists"
  - "Complete all 5 steps in order"
  - "Run <code>ls project</code> and confirm README.txt and errors.txt exist"
  - "Click <strong>Test</strong> when ready"

hints:
  - "<code>></code> writes grep output to a file (Chapter 8)"
  - "Optionally run <code>cat project/README.txt</code> at the end"
  - "Use <strong>Reset</strong> to start over if needed"
