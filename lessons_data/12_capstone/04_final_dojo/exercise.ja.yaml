lesson:
  chapter: "12_capstone"
  chapter_number: "12"
  number: "04"
  id: "12_capstone/04_final_dojo"
  title: "道場最終試練"

description: "必修範囲のコマンドを組み合わせた総合課題。"

task_description: |
  <p>最終試練です。次の操作を順番に完了してください。</p>
  <ol>
    <li><code>mkdir -p project/logs</code> でフォルダを作成</li>
    <li><code>cp server.log project/logs/</code> でログをコピー</li>
    <li><code>grep ERROR project/logs/server.log > project/errors.txt</code> で ERROR を保存</li>
    <li><code>wc -l project/errors.txt</code> で行数を確認（2 行）</li>
    <li><code>echo "Project complete" > project/README.txt</code> で README を作成</li>
  </ol>

instructions:
  - "<code>ls</code> で <code>server.log</code> があることを確認します"
  - "上記 5 ステップを順番に実行します"
  - "<code>ls project</code> で README.txt と errors.txt があることを確認します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "<code>></code> は grep の結果をファイルに書き込みます（第8章）"
  - "最後に <code>cat project/README.txt</code> で確認してもよいです"
  - "うまくいかないときは <strong>リセット</strong> ボタンで最初からやり直せます"
