lesson:
  chapter: "08_pipe_redirect"
  chapter_number: "08"
  number: "04"
  id: "08_pipe_redirect/04_combine"
  title: "Combining Pipes and Redirection"

description: "Combine pipes and redirection to save the ERROR line count to a file."

task_description: |
  <p>Run <code>cat app.log | grep ERROR | wc -l &gt; error_count.txt</code> to count ERROR lines and save the result.</p>

instructions:
  - "Run <code>cat app.log | grep ERROR | wc -l &gt; error_count.txt</code>"
  - "Run <code>cat error_count.txt</code> to verify the count (2)"
  - "Click the <strong>Test</strong> button when ready"

hints:
  - "Chain commands with <code>|</code>, then save the final output with <code>&gt;</code>"
  - "Success if <code>cat error_count.txt</code> shows <code>2</code>"
