lesson:
  chapter: "08_pipe_redirect"
  chapter_number: "08"
  number: "04"
  id: "08_pipe_redirect/04_combine"
  title: "パイプとリダイレクトを組み合わせる"

description: "パイプとリダイレクトを組み合わせて ERROR 件数をファイルに保存します。"

task_description: |
  <p><code>cat app.log | grep ERROR | wc -l &gt; error_count.txt</code> で ERROR 行の件数を数え、ファイルに保存しましょう。</p>

instructions:
  - "<code>cat app.log | grep ERROR | wc -l &gt; error_count.txt</code> を実行します"
  - "<code>cat error_count.txt</code> で保存した件数（2）を確認します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "パイプ <code>|</code> で処理をつなぎ、最後に <code>&gt;</code> でファイルに保存します"
  - "<code>cat error_count.txt</code> で <code>2</code> と表示されれば成功です"
