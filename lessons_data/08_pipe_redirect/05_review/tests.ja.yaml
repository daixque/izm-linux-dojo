initial_filesystem:
  /home/user:
    type: directory
    children:
      app.log:
        type: file
        content: '2024-01-01 INFO Server started

          2024-01-01 INFO Listening on port 8080

          2024-01-02 WARN Low memory

          2024-01-02 ERROR Connection failed

          2024-01-03 INFO User login

          2024-01-03 ERROR Disk full

          2024-01-04 INFO Shutdown

          '

initial_cwd: /home/user

solution_commands:
  - "cat app.log | grep ERROR | wc -l > error_count.txt"
  - "grep ERROR app.log > errors.txt"

tests:
  - name: "error_count.txt に件数 2"
    description: "パイプ + リダイレクトの件数"
    type: command_sequence
    steps:
      - command: "cat app.log | grep ERROR | wc -l > error_count.txt"
        expected_output: ""
      - command: "cat error_count.txt"
        expected_output: |
          2
  - name: "errors.txt に ERROR 行"
    description: "grep + リダイレクト"
    type: command_sequence
    steps:
      - command: "grep ERROR app.log > errors.txt"
        expected_output: ""
      - command: "cat errors.txt"
        expected_output: |
          2024-01-02 ERROR Connection failed
          2024-01-03 ERROR Disk full
