initial_filesystem:
  /home/user:
    type: directory
    children:
      app.log:
        type: file
        content: '2024-01-01 INFO Server started

          2024-01-01 INFO Listening on port 8080

          2024-01-02 WARN Low memory

          2024-01-02 ERROR Connection failed

          2024-01-03 INFO User login

          2024-01-03 ERROR Disk full

          2024-01-04 INFO Shutdown

          '

initial_cwd: /home/user

solution_commands:
  - "cat app.log | grep ERROR | wc -l"

tests:
  - name: "ERROR 行が 2 行"
    description: "パイプ + wc -l の結果"
    type: command_output
    command: "cat app.log | grep ERROR | wc -l"
    expected_output: |
      2
  - name: "grep までのパイプ"
    description: "cat | grep の出力"
    type: command_output
    command: "cat app.log | grep ERROR"
    expected_output: |
      2024-01-02 ERROR Connection failed
      2024-01-03 ERROR Disk full
