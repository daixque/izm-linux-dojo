lesson:
  chapter: "08_pipe_redirect"
  chapter_number: "08"
  number: "03"
  id: "08_pipe_redirect/03_pipe"
  title: "パイプ"

content: |
  <h2>コマンド同士をつなげる</h2>
  <p>1 つのコマンドの結果を、別のコマンドの入力として使いたい場面があります。たとえば「ログファイルから ERROR 行だけ取り出して、件数を数える」といった処理です。</p>
  <p>中間結果をいちいちファイルに保存しなくても、コマンド同士を<strong>その場でつなげられる</strong>仕組みがあります。これが<strong>パイプ</strong>（<code>|</code>）です。前のコマンドの出力が、次のコマンドの入力へ流れるイメージです。</p>

  <h2>基本の形</h2>
  <pre><code>コマンド1 | コマンド2</code></pre>
  <p>左のコマンドの標準出力が、右のコマンドの標準入力に渡されます。</p>

  <h2>例: ログから ERROR を数える</h2>
  <pre><code>$ cat app.log | grep ERROR | wc -l
  2</code></pre>
  <p>3 つのコマンドが左から順に処理されます。</p>
  <ol>
    <li><code>cat app.log</code> — ファイルの内容を出力する</li>
    <li><code>grep ERROR</code> — ERROR を含む行だけに絞る</li>
    <li><code>wc -l</code> — 行数を数える（第3章で学んだ <code>wc</code>）</li>
  </ol>
  <p>最終的に「ERROR 行が 2 行ある」という結果が表示されます。</p>

  <h2>パイプの利点</h2>
  <p>パイプを使えば、一時的なファイルを作らずに処理をつなげられます。データが左から右へ流れていくので、処理の流れも読みやすくなります。</p>

  <h2>次のステップ</h2>
  <p>演習ページでパイプを使ったログ分析を試してみましょう！</p>
