  title: "The Terminal and the Linux World"

content: |
  <h2>Welcome to IZM Linux Dojo</h2>
  <p>You will learn to give your computer <strong>instructions</strong> (commands) through a screen called the <strong>terminal</strong>. A text-only screen may be new to you, but once you understand commands, you can organize files, check settings, and handle many tasks <strong>precisely and quickly</strong>.</p>
  <p>Chapter 0 covers how to read the terminal screen and how Linux and macOS relate to it.</p>

  <h2>What Are Linux and macOS?</h2>
  <p><strong>Linux</strong> is one of the operating systems (OS) used around the world. Many computers around you — servers, smartphones (Android), embedded devices — run a Linux-based OS.</p>
  <p><strong>macOS</strong> is the OS used on Apple's Mac computers. It looks different from Linux on the surface, but underneath it is a <strong>Unix-like system</strong>, very similar to Linux. That means basic terminal operations and the idea of files work <strong>almost the same</strong> on Linux and macOS.</p>
  <p>The lessons ahead mainly use Linux as an example, but Mac users can follow along with the same intuition.</p>
  <p><em>Note: Windows differs significantly from Linux/macOS in file paths, permissions, and available commands, so it is outside the scope of this curriculum.</em></p>

  <h2>GUI and CUI — Two Ways to Operate a Computer</h2>
  <p>There are two broad ways to operate a computer:</p>
  <ul>
    <li><strong>GUI</strong> (Graphical User Interface) — the familiar screen with icons, buttons, and mouse control. Opening a folder in Finder (Mac) or File Explorer (Windows) is GUI.</li>
    <li><strong>CUI</strong> (Character User Interface) — a text-only screen where you type instructions from the keyboard. The <strong>terminal</strong> is the classic example of CUI.</li>
  </ul>
  <p>GUI is intuitive, but repeating the same work many times or specifying fine-grained conditions can become tedious. CUI (the terminal) takes getting used to, but its strength is <strong>precise control with short commands</strong>.</p>

  <h2>Reading the Terminal Screen</h2>
  <p>On the exercise page, a terminal appears on the left (or center). A typical terminal looks like this:</p>
  <pre><code>Welcome to IZM Linux Dojo
  Type commands and press Enter.

  user@dojo:~$ _</code></pre>
  <ul>
    <li><strong>Welcome message</strong> — a greeting. You do not need to press Enter after reading it.</li>
    <li><strong>Prompt</strong> — a marker like <code>user@dojo:~$</code> that shows the terminal is waiting for your input. You type commands to the right of it.</li>
    <li><strong>Cursor</strong> — the blinking <code>_</code> shows where the next character will appear.</li>
  </ul>
  <p>The <code>~</code> in the prompt means you are in your <strong>home</strong> directory (your personal folder). You will learn more in Chapter 1.</p>

  <h2>The Enter Key — Sending Your Command</h2>
  <p>After typing a command, press <kbd>Enter</kbd> to run it. Until you press Enter, the computer treats your input as incomplete.</p>
  <p>If you make a typo, use <kbd>Backspace</kbd> to delete characters. After a command runs, the result appears and a new prompt returns so you can type the next command.</p>

  <h2>Why Learn Commands?</h2>
  <p>Terminal commands help in situations like these:</p>
  <ul>
    <li>Organizing and checking many files</li>
    <li>Inspecting logs from programs or servers</li>
    <li>Reading configuration files</li>
    <li>Working on Linux servers or Mac development environments</li>
  </ul>
  <p>In Chapter 1, after you understand how files and folders work, you will learn <code>ls</code> (list) and <code>cd</code> (change directory).</p>

  <h2>Next Step</h2>
  <p>On the exercise page, you will try the <code>clear</code> command, which clears the screen. When the terminal fills with text, this is your first step toward keeping the screen tidy.</p>
