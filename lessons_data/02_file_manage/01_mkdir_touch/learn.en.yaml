  number: "01"
  id: "02_file_manage/01_mkdir_touch"
  title: "Creating Files and Directories"

content: |
  <h2>Review from Chapter 1</h2>
  <p>In Chapter 1 you learned <code>pwd</code>, <code>ls</code>, and <code>cd</code> — how to <strong>see where you are</strong>, <strong>list contents</strong>, and <strong>move around</strong>. These are "look and move" operations.</p>
  <p>This chapter covers how to <strong>create</strong> new files and directories.</p>

  <h2>Creating New Folders and Files</h2>
  <p>In Finder, "File → New Folder" or "New File" adds an item in the folder you currently have open. The terminal can do the same thing — new items appear in your <strong>current directory</strong> (the location shown by <code>pwd</code>).</p>
  <p>Before you create something, run <code>pwd</code> to confirm where you are. That helps prevent accidentally creating files in the wrong place.</p>

  <h2>Creating a Directory — <code>mkdir</code></h2>
  <p><code>mkdir</code> (make directory) creates a new folder.</p>
  <pre><code>$ mkdir project
  $ ls
  documents
  notes.txt
  project</code></pre>
  <p>A folder named <code>project</code> appears inside your current directory.</p>

  <h3>When the parent folder does not exist</h3>
  <p>If you try something like <code>mkdir project/src</code> when <code>project</code> does not exist yet, you may get an error. You need to create <code>project</code> first, then <code>src</code>.</p>

  <h3>Creating deep paths at once — <code>mkdir -p</code></h3>
  <p>The <code>-p</code> option creates any missing parent directories along the way.</p>
  <pre><code>$ mkdir -p project/src
  $ ls project
  src</code></pre>
  <p>Use this when you want a deep path like <code>photos/2024/summer</code> without creating each folder one by one.</p>

  <h2>Creating an Empty File — <code>touch</code></h2>
  <p><code>touch</code> creates a new empty file — like preparing a blank notebook before you write in it. You can add content later with a text editor.</p>
  <pre><code>$ touch memo.txt
  $ ls
  documents
  memo.txt
  notes.txt
  project</code></pre>

  <h2>Verify with <code>ls</code></h2>
  <p>Use <code>ls</code> from Chapter 1 to confirm your new items exist. If something looks wrong, run <code>pwd</code> to check which directory you are in.</p>

  <h2>Next Step</h2>
  <p>On the exercise page, try <code>mkdir</code>, <code>mkdir -p</code>, and <code>touch</code>!</p>
