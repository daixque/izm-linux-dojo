  title: "File Operations Review"

content: |
  <h2>What You Have Learned (Chapters 1–2)</h2>
  <p>You now have the core file operations for the terminal. Here is a recap.</p>

  <h3>Chapter 1 — Navigation</h3>
  <table>
    <tr><th>Command</th><th>Meaning</th></tr>
    <tr><td><code>pwd</code></td><td>Show current directory path</td></tr>
    <tr><td><code>ls</code></td><td>List directory contents</td></tr>
    <tr><td><code>cd</code></td><td>Change directory</td></tr>
  </table>

  <h3>Chapter 2 — File Management</h3>
  <table>
    <tr><th>Command</th><th>Meaning</th></tr>
    <tr><td><code>mkdir</code></td><td>Create a directory</td></tr>
    <tr><td><code>mkdir -p</code></td><td>Create nested directories</td></tr>
    <tr><td><code>touch</code></td><td>Create an empty file</td></tr>
    <tr><td><code>cp</code></td><td>Copy a file (original remains)</td></tr>
    <tr><td><code>cp -r</code></td><td>Copy a directory</td></tr>
    <tr><td><code>mv</code></td><td>Move or rename (original gone)</td></tr>
    <tr><td><code>rm</code></td><td>Delete a file</td></tr>
    <tr><td><code>rm -r</code> / <code>rmdir</code></td><td>Delete a directory</td></tr>
  </table>

  <h2>Typical Workflow</h2>
  <ol>
    <li>Use <code>pwd</code> and <code>ls</code> to see where you are</li>
    <li>Use <code>mkdir -p</code> to prepare folders</li>
    <li>Use <code>cp</code> and <code>mv</code> to organize files</li>
    <li>Use <code>rm</code> to clean up</li>
    <li>Run <code>ls</code> again to verify the result</li>
  </ol>

  <h2>Common Mistakes</h2>
  <ul>
    <li><strong>Wrong directory</strong> — always check with <code>pwd</code> first</li>
    <li><strong>Confusing cp and mv</strong> — copy keeps the original, move does not</li>
    <li><strong>Deleting too quickly</strong> — read filenames and paths carefully</li>
  </ul>

  <h2>Next Step</h2>
  <p>The exercise combines these commands in a file-organizing task. In Chapter 3 you will learn to <strong>read file contents</strong> with <code>cat</code> and more.</p>
