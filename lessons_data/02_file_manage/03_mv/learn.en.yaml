  id: "02_file_manage/03_mv"
  title: "Moving and Renaming"

content: |
  <h2>Moving and Renaming — How the OS Sees It</h2>
  <p>From the computer's point of view, both <strong>moving</strong> and <strong>renaming</strong> a file mean changing its address (path). Renaming within the same folder is like rewriting only the last part of the address.</p>
  <p>In Finder, dragging a file to another folder is a move; clicking the filename to edit it is a rename. In the terminal, the single <code>mv</code> (move) command handles both.</p>

  <h2>Difference from <code>cp</code></h2>
  <ul>
    <li><code>cp</code> — keeps the original and creates a copy</li>
    <li><code>mv</code> — the item leaves its old location and appears at the new one (or under a new name)</li>
  </ul>

  <h2>Rename a File</h2>
  <pre><code>$ mv old_name.txt new_name.txt
  $ ls
  new_name.txt</code></pre>
  <p>Within the same directory, the filename changes from <code>old_name.txt</code> to <code>new_name.txt</code>.</p>

  <h2>Move to Another Folder</h2>
  <pre><code>$ mv new_name.txt archive/
  $ ls archive
  new_name.txt</code></pre>
  <p>The file moves into <code>archive</code> and disappears from its original location.</p>

  <h2>Move and Rename at Once</h2>
  <p>You can also give the file a new name at the destination.</p>
  <pre><code>$ mv draft.txt archive/final.txt</code></pre>
  <p><code>draft.txt</code> becomes <code>archive/final.txt</code> in one step.</p>

  <h2>Next Step</h2>
  <p>On the exercise page, rename a file and move it into another folder!</p>
