initial_filesystem:
  /home/user:
    type: directory
    children:
      temp.txt:
        type: file
        content: "temporary data\n"
      junk.txt:
        type: file
        content: "unneeded file\n"
      keep.txt:
        type: file
        content: "important — do not delete\n"
      empty_dir:
        type: directory
        children: {}

initial_cwd: /home/user

solution_commands:
  - rm temp.txt
  - rm junk.txt
  - rmdir empty_dir

tests:
  - name: "keep.txt だけが残っている"
    description: "不要ファイル削除後の ls を確認"
    type: command_output
    command: ls
    expected_output: "keep.txt\n"

  - name: "temp.txt が削除されている"
    description: "削除したファイルに cat できないことを確認"
    type: command_output
    command: cat keep.txt
    expected_output: "important — do not delete\n"

  - name: "empty_dir が削除されている"
    description: "空ディレクトリが消えているか"
    type: command_sequence
    steps:
      - command: ls
        expected_output: "keep.txt\n"
      - command: pwd
        expected_output: "/home/user\n"
        expected_cwd: /home/user
