lesson:
  chapter: "02_file_manage"
  chapter_number: "02"
  number: "04"
  id: "02_file_manage/04_rm"
  title: "ファイルとフォルダの削除"

content: |
  <h2>削除とは</h2>
  <p>不要になったファイルやフォルダを消す操作を<strong>削除</strong>といいます。Linux では <code>rm</code>（remove）コマンドを使います。</p>
  <p>Finder では、ファイルを<strong>ゴミ箱</strong>に入れると一時的に退避され、空にするまで復元できます。ターミナルの <code>rm</code> は通常、<strong>ゴミ箱を経由せず直接消える</strong>操作です。削除したデータは簡単には元に戻せないので、実行する前によく確認しましょう。</p>

  <h2>ファイルを削除する — <code>rm</code></h2>
  <pre><code>$ rm temp.txt</code></pre>
  <p>指定したファイルが消えます。<code>ls</code> で本当に消えたか確認する習慣をつけましょう。</p>

  <h2>ディレクトリを削除する — <code>rm -r</code></h2>
  <p>フォルダを削除するときは <code>-r</code> オプションが必要です。フォルダの中身（子フォルダも含めて）ごとまとめて消します。</p>
  <pre><code>$ rm -r old_folder</code></pre>
  <p>空のフォルダだけ消す場合は <code>rmdir</code> という専用コマンドもあります（中身があると失敗します）。</p>
  <pre><code>$ rmdir empty_dir</code></pre>

  <h2>削除の注意点</h2>
  <ul>
    <li><strong>本当に消していいか</strong> — ファイル名をよく読んでから Enter を押す</li>
    <li><strong>パスを間違えない</strong> — <code>pwd</code> で現在地を確認してから削除する</li>
    <li><strong>フォルダ削除は特に慎重に</strong> — <code>rm -r</code> は中身をすべて消します</li>
  </ul>
  <p>本物の Linux では <code>rm -rf /</code> のような危険なコマンドでシステム全体を壊してしまう事故も報告されています。パスを必ず確認する習慣を身につけましょう。</p>

  <h2>次のステップ</h2>
  <p>演習ページで、不要なファイルと空のディレクトリを安全に削除してみましょう。</p>
