initial_filesystem:
  /home/user:
    type: directory
    children:
      my_notes.txt:
        type: file
        content: "my notes\n"
        owner: user
        group: user
        mode: 644
      alice_secret.txt:
        type: file
        content: "alice's secret data\n"
        owner: alice
        group: alice
        mode: 600

initial_cwd: /home/user

solution_commands:
  - ls -l alice_secret.txt
  - cat alice_secret.txt

tests:
  - name: "alice_secret.txt は cat できない"
    description: "Permission denied を確認"
    type: command_output
    command: cat alice_secret.txt
    expected_output: ""
    expected_stderr: "cat: alice_secret.txt: Permission denied\n"
    expected_exit_code: 1

  - name: "my_notes.txt は cat できる"
    description: "自分のファイルは読める"
    type: command_output
    command: cat my_notes.txt
    expected_output: "my notes\n"
