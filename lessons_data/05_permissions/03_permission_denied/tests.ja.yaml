initial_filesystem:
  /home/user:
    type: directory
    children:
      my_notes.txt:
        type: file
        content: "my notes\n"
        owner: user
        group: user
        mode: 644
      alice_secret.txt:
        type: file
        content: "alice's secret data\n"
        owner: alice
        group: alice
        mode: 600
      alice_private:
        type: directory
        owner: alice
        group: alice
        mode: 700
        children:
          secret.txt:
            type: file
            content: "hidden\n"
            owner: alice
            group: alice
            mode: 600

initial_cwd: /home/user

solution_commands:
  - ls -l
  - cat alice_secret.txt
  - rm alice_secret.txt
  - cd alice_private
  - chmod o+r alice_secret.txt
  - cat my_notes.txt

tests:
  - name: "alice_secret.txt は cat できない"
    description: "読み取り権限なしで Permission denied"
    type: command_output
    command: cat alice_secret.txt
    expected_output: ""
    expected_stderr: "cat: alice_secret.txt: Permission denied\n"
    expected_exit_code: 1

  - name: "alice_secret.txt は rm できない"
    description: "書き込み権限なしで Permission denied"
    type: command_output
    command: rm alice_secret.txt
    expected_output: ""
    expected_stderr: "rm: cannot remove 'alice_secret.txt': Permission denied\n"
    expected_exit_code: 1

  - name: "alice_private に cd できない"
    description: "実行権限なしで Permission denied"
    type: command_output
    command: cd alice_private
    expected_output: ""
    expected_stderr: "cd: alice_private: Permission denied\n"
    expected_exit_code: 1

  - name: "他人のファイルは chmod できない"
    description: "オーナーでないため Operation not permitted"
    type: command_output
    command: chmod o+r alice_secret.txt
    expected_output: ""
    expected_stderr: "chmod: changing permissions of 'alice_secret.txt': Operation not permitted\n"
    expected_exit_code: 1

  - name: "my_notes.txt は cat できる"
    description: "自分のファイルは読める"
    type: command_output
    command: cat my_notes.txt
    expected_output: "my notes\n"
