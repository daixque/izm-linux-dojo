lesson:
  chapter: "05_permissions"
  chapter_number: "05"
  number: "03"
  id: "05_permissions/03_permission_denied"
  title: "権限で拒否される"

description: "権限のないファイルで cat が Permission denied になることを確認します。"

task_description: |
  <p><code>alice_secret.txt</code> に <code>cat</code> を試し、Permission denied エラーを確認しましょう。</p>

instructions:
  - "<code>ls -l alice_secret.txt</code> で権限を確認します（<code>-rw-------</code>、オーナーは alice）"
  - "<code>cat alice_secret.txt</code> を実行します"
  - "<code>Permission denied</code> というエラーが表示されることを確認します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "あなたは <code>user</code> なので、alice の private ファイルは読めません"
  - "エラーは正常な動作です — セキュリティが働いています"
  - "自分の <code>my_notes.txt</code> は普通に cat できます"
