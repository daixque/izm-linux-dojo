initial_filesystem:
  /home/user:
    type: directory
    children:
      hello.sh:
        type: file
        content: "#!/bin/bash\necho Hello\n"
        owner: user
        group: user
        mode: 644

initial_cwd: /home/user

solution_commands:
  - chmod u+x hello.sh
  - ls -l hello.sh
  - ./hello.sh

tests:
  - name: "hello.sh に実行権限が付いている"
    description: "chmod u+x 後の ls -l を確認"
    type: command_output
    setup_commands:
      - chmod u+x hello.sh
    command: ls -l hello.sh
    expected_output: "-rwxr--r-- 1 user user   23 Jan  1 10:00 hello.sh\n"

  - name: "hello.sh を実行できる"
    description: "chmod u+x 後に ./hello.sh を実行"
    type: command_output
    setup_commands:
      - chmod u+x hello.sh
    command: ./hello.sh
    expected_output: "Hello\n"
