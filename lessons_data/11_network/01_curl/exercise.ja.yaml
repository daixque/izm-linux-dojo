lesson:
  chapter: "11_network"
  chapter_number: "11"
  number: "01"
  id: "11_network/01_curl"
  title: "curl で Web 取得"

description: "curl で模擬 API からデータを取得し、ファイルに保存します。"

task_description: |
  <p>模擬 API からデータを取得しましょう。まず <code>curl</code> でレスポンスを表示し、次に <code>-o</code> オプションでファイルに保存します。</p>

instructions:
  - "<code>curl https://dojo.example/api/hello</code> で JSON を表示します"
  - "<code>curl -o info.txt https://dojo.example/data/info.txt</code> でファイルに保存します"
  - "<code>cat info.txt</code> で保存内容を確認します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "<code>-o</code> の直後に保存先ファイル名を書きます"
  - "URL は <code>https://dojo.example/...</code> で始まります"
  - "うまくいかないときは <strong>リセット</strong> ボタンで最初からやり直せます"
