lesson:
  chapter: "11_network"
  chapter_number: "11"
  number: "01"
  id: "11_network/01_curl"
  title: "curl で Web 取得"

content: |
  <h2>ネットワークと HTTP</h2>
  <p>インターネット上の Web サイトや API からデータを取得するとき、多くの場合 <strong>HTTP</strong> という決まりで通信します。ブラウザがページを表示するときも、裏では HTTP でデータを受け取っています。</p>
  <p>ターミナルから Web のデータを取得する代表的なコマンドが <strong>curl</strong> です。道場では実際のインターネットには接続せず、<strong>固定の模擬レスポンス</strong>を返します。</p>

  <h2><code>curl URL</code> — 内容を表示</h2>
  <pre><code>$ curl https://dojo.example/api/hello
  {"message":"Hello from Dojo API"}</code></pre>
  <p>URL を指定すると、サーバーから返ってきた内容（レスポンス）がターミナルに表示されます。</p>

  <h2><code>curl -o ファイル URL</code> — ファイルに保存</h2>
  <p><code>-o</code> オプションで、レスポンスをファイルに保存できます。第2章のファイル操作と組み合わせると便利です。</p>
  <pre><code>$ curl -o info.txt https://dojo.example/data/info.txt
  $ cat info.txt
  IZM Linux Dojo
  Version 1.0</code></pre>

  <h2>道場で使える URL</h2>
  <ul>
    <li><code>https://dojo.example/api/hello</code> — JSON 形式の挨拶</li>
    <li><code>https://dojo.example/data/info.txt</code> — テキスト情報</li>
    <li><code>https://dojo.example/api/status</code> — ステータス JSON</li>
  </ul>

  <h2>次のステップ</h2>
  <p>演習では curl で模擬 API からデータを取得し、ファイルに保存します。</p>
