initial_filesystem:
  /home/user:
    type: directory
    children: {}

initial_cwd: /home/user

solution_commands:
  - curl https://dojo.example/api/hello
  - curl -o info.txt https://dojo.example/data/info.txt
  - cat info.txt

tests:
  - name: "curl displays JSON"
    description: "hello API output"
    type: command_output
    command: curl https://dojo.example/api/hello
    expected_output: "{\"message\":\"Hello from Dojo API\"}\n"

  - name: "info.txt is created"
    description: "curl -o result"
    type: command_sequence
    steps:
      - command: curl -o info.txt https://dojo.example/data/info.txt
        expected_output: ""
      - command: ls
        expected_output: "info.txt\n"

  - name: "Saved content is correct"
    description: "Verify with cat"
    type: command_output
    command: cat info.txt
    setup_commands:
      - curl -o info.txt https://dojo.example/data/info.txt
    expected_output: |
      IZM Linux Dojo
      Version 1.0
