lesson:
  chapter: "11_network"
  chapter_number: "11"
  number: "01"
  id: "11_network/01_curl"
  title: "Fetching Data from the Web"

description: "Fetch data from a mock API with curl and save it to a file."

task_description: |
  <p>Fetch data from the mock API. First display the response with <code>curl</code>, then save to a file with <code>-o</code>.</p>

instructions:
  - "Run <code>curl https://dojo.example/api/hello</code> to display JSON"
  - "Run <code>curl -o info.txt https://dojo.example/data/info.txt</code> to save a file"
  - "Run <code>cat info.txt</code> to verify the saved content"
  - "Click <strong>Test</strong> when ready"

hints:
  - "Put the filename right after <code>-o</code>"
  - "URLs start with <code>https://dojo.example/...</code>"
  - "Use <strong>Reset</strong> to start over if needed"
