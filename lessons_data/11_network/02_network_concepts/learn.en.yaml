  title: "Network Concepts"

content: |
  <h2>The World of Network Commands</h2>
  <p>Linux has many useful network commands. Here we focus on <strong>concepts</strong>. For commands the dojo cannot run, learn their names and roles.</p>

  <h2><code>wget</code> — Download Files</h2>
  <p>Similar to <code>curl</code>, but often associated with <strong>downloading files</strong>. In the dojo you practiced the same idea with <code>curl -o</code>.</p>

  <h2><code>ping</code> — Check Connectivity</h2>
  <p>Sends a "are you there?" message to a server and shows response time. Used to verify network connectivity. The dojo does not perform real network traffic.</p>

  <h2><code>ssh</code> — Remote Login</h2>
  <p>Securely log in to another computer and use its terminal. Common in server administration, but requires setup and keys — outside the dojo scope.</p>

  <h2>Review: <code>curl</code></h2>
  <p><code>curl</code> from this chapter fetches data over HTTP.</p>
  <ul>
    <li><code>curl URL</code> — print the response</li>
    <li><code>curl -o file URL</code> — save to a file</li>
  </ul>
  <p>Dojo mock URLs: <code>https://dojo.example/api/hello</code>, <code>https://dojo.example/data/info.txt</code></p>

  <h2>Next Step</h2>
  <p>Complete the curl review exercise and prepare for Chapter 12 capstone tasks.</p>
