lesson:
  chapter: "11_network"
  chapter_number: "11"
  number: "02"
  id: "11_network/02_network_concepts"
  title: "ネットワークコマンドの概念"

description: "curl の復習と、ネットワークコマンドの概念確認。"

task_description: |
  <p>前のレッスンの <code>curl</code> を復習しましょう。模擬 API からステータス JSON を取得し、<code>status.json</code> として保存します。</p>

instructions:
  - "<code>curl https://dojo.example/api/status</code> でステータスを表示します"
  - "<code>curl -o status.json https://dojo.example/api/status</code> でファイルに保存します"
  - "<code>cat status.json</code> で内容を確認します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "前のレッスンと同じ <code>-o</code> の使い方です"
  - "JSON は <code>{</code> で始まるテキストデータです"
  - "うまくいかないときは <strong>リセット</strong> ボタンで最初からやり直せます"
