  number: "02"
  id: "11_network/02_network_concepts"
  title: "ネットワークコマンドの概念"

content: |
  <h2>ネットワークとは？</h2>
  <p>コンピューター同士がケーブルや Wi-Fi でつながり、データをやり取りする仕組みを<strong>ネットワーク</strong>と呼びます。インターネットは、世界中のネットワークがつながった巨大なネットワークです。</p>
  <p>Linux には、ネットワーク関連の便利なコマンドがたくさんあります。ここでは代表的なコマンドが<strong>何のために使われるか</strong>を見ていきます。道場で実行できないものも、実際の Linux 環境で出会ったときに役割がわかるよう、名前と用途を説明します。</p>

  <h2>URL と HTTP のおさらい</h2>
  <p>前のレッスンで学んだ <strong>URL</strong> は、Web 上のデータの住所です。<code>https://</code> で始まる URL は、HTTPS（安全な HTTP）で通信することを示します。</p>
  <p><strong>HTTP</strong> は、ブラウザや curl がサーバーに「この URL のデータをください」と頼み、サーバーがデータを返すためのルールです。curl はこの HTTP 通信をターミナルから行うツールです。</p>

  <h2><code>wget</code> — ファイルをダウンロード</h2>
  <p><code>wget</code> は <code>curl</code> と似ていますが、<strong>ファイルのダウンロード</strong>に特化したコマンドです。URL を指定してファイルを保存します。道場では <code>curl -o</code> で同様の操作を学びました。</p>

  <h2><code>ping</code> — 接続確認</h2>
  <p><code>ping</code> は、指定したサーバーに小さなデータを送り、「届きますか？」と問い合わせます。相手が応答すれば、ネットワーク経路がつながっていることがわかります。</p>
  <p>たとえるなら、遠くの友人に「聞こえる？」と声をかけて、返事が返ってくるか確認するようなものです。応答にかかった時間（ミリ秒）も表示されるので、回線の状態をざっくり把握できます。道場では実際のネットワーク通信は行いません。</p>

  <h2><code>ssh</code> — リモートログイン</h2>
  <p><code>ssh</code> は、別のコンピューター（多くはサーバー）に安全にログインして、ターミナル操作を行うコマンドです。自宅の PC から、データセンターにあるサーバーを操作するときなどに使われます。接続にはユーザー名や暗号鍵の設定が必要なため、道場の対象外です。</p>

  <h2><code>curl</code> の復習</h2>
  <p>第11章で学んだ <code>curl</code> は、HTTP でデータを取得する基本ツールです。</p>
  <table>
    <thead>
      <tr><th>コマンド</th><th>意味</th></tr>
    </thead>
    <tbody>
      <tr><td><code>curl URL</code></td><td>レスポンスをターミナルに表示</td></tr>
      <tr><td><code>curl -o ファイル URL</code></td><td>レスポンスをファイルに保存</td></tr>
    </tbody>
  </table>
  <p>道場の模擬 URL：<code>https://dojo.example/api/hello</code>、<code>https://dojo.example/data/info.txt</code></p>

  <h2>次のステップ</h2>
  <p>演習では <code>curl</code> の復習問題に取り組み、第12章の総合演習へ進む準備をします。</p>
