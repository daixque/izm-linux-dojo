initial_filesystem:
  /home/user:
    type: directory
    children: {}

initial_cwd: /home/user

solution_commands:
  - curl https://dojo.example/api/status
  - curl -o status.json https://dojo.example/api/status
  - cat status.json

tests:
  - name: "status API JSON is displayed"
    description: "curl status endpoint"
    type: command_output
    command: curl https://dojo.example/api/status
    expected_output: "{\"status\":\"ok\",\"uptime\":\"24h\"}\n"

  - name: "status.json is saved correctly"
    description: "curl -o and cat"
    type: command_sequence
    steps:
      - command: curl -o status.json https://dojo.example/api/status
        expected_output: ""
      - command: cat status.json
        expected_output: "{\"status\":\"ok\",\"uptime\":\"24h\"}\n"
