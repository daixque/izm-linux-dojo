lesson:
  chapter: "04_users_ownership"
  chapter_number: "04"
  number: "03"
  id: "04_users_ownership/03_multi_user"
  title: "複数ユーザー環境を理解する"

content: |
  <h2>1 台の PC を複数人で使う</h2>
  <p>学校や研究室の Linux サーバーでは、たくさんのユーザーが同じコンピューターを共有します。それぞれにホームディレクトリがあり、基本的には<strong>自分のホームの中</strong>で作業します。</p>
  <pre class="tree"><code>/home/
  ├── user/       ← あなた（演習ユーザー）
  ├── alice/      ← 別のユーザー alice の領域
  └── bob/        ← 別のユーザー bob の領域</code></pre>
  <p>macOS でも、家族で使う Mac ならユーザーごとに <code>/Users/名前</code> が分かれているのと同じ考え方です。</p>

  <h2>他人のファイルが混在する</h2>
  <p>共有フォルダなどでは、<strong>オーナーが違うファイル</strong>が同じ場所に並ぶことがあります。</p>
  <pre><code>$ ls -l shared/
  -rw-r--r-- 1 user  user  10 Jan  1 10:00 my_report.txt
  -rw-r--r-- 1 alice alice 15 Jan  1 10:00 alice_notes.txt
  -rw-r--r-- 1 bob   bob   12 Jan  1 10:00 bob_data.txt</code></pre>
  <p><code>whoami</code> の結果（<code>user</code>）と <code>ls -l</code> の 3 列目（オーナー）を比べると、「これは<strong>自分の</strong>ファイルか、<strong>他人の</strong>ファイルか」が分かります。</p>

  <h2>他人のファイルは触れないことが多い</h2>
  <p>他人がオーナーのファイルは、読めない・書けない・消せない、ということがよくあります。ファイルを触る前に <code>whoami</code> と <code>ls -l</code> のオーナー列を比べる習慣をつけましょう。</p>

  <h2>この章のポイント</h2>
  <table>
    <thead>
      <tr><th>コマンド・概念</th><th>内容</th></tr>
    </thead>
    <tbody>
      <tr><td><code>whoami</code></td><td>今のユーザー名を確認</td></tr>
      <tr><td><code>ls -l</code> の 3 列目</td><td>オーナー（持ち主）</td></tr>
      <tr><td><code>ls -l</code> の 4 列目</td><td>グループ</td></tr>
      <tr><td>複数ユーザー</td><td>同じフォルダに他人のファイルが混在することがある</td></tr>
    </tbody>
  </table>

  <h2>次の章 — 権限</h2>
  <p>オーナー以外にも、「グループ」や「その他のユーザー」に許可を与える仕組みがあります。それが<strong>権限（permissions）</strong>です。次の章では <code>rwx</code> の読み方と <code>chmod</code> による変更方法を扱います。</p>

  <h2>次のステップ</h2>
  <p>演習ページで <code>shared</code> フォルダの <code>ls -l</code> を読み、誰のファイルか見分けてみましょう。</p>
