lesson:
  chapter: "04_users_ownership"
  chapter_number: "04"
  number: "03"
  id: "04_users_ownership/03_multi_user"
  title: "Sharing a Computer Among Users"

description: "Read ls -l output when files from different users are mixed together."

task_description: |
  <p>Move into the <code>shared</code> directory and use <code>ls -l</code> to see who owns each file.</p>

instructions:
  - "Run <code>cd shared</code> to enter the shared directory"
  - "Run <code>ls -l</code> to list files with details"
  - "<code>my_report.txt</code> is owned by <code>user</code> (you)"
  - "<code>alice_notes.txt</code> and <code>bob_data.txt</code> belong to others"
  - "When ready, click the <strong>Test</strong> button"

hints:
  - "Compare <code>whoami</code> with column 3 of <code>ls -l</code>"
  - "Same owner name means it is your file"
  - "Use the <strong>Reset</strong> button to start over if needed"
