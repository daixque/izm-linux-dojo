lesson:
  chapter: "04_users_ownership"
  chapter_number: "04"
  number: "03"
  id: "04_users_ownership/03_multi_user"
  title: "Sharing a Computer Among Users"

content: |
  <h2>Review</h2>
  <p>You can read a file's <strong>owner</strong> and <strong>group</strong> from columns 3 and 4 of <code>ls -l</code>. Now imagine a world where <strong>many users</strong> share one computer.</p>

  <h2>One PC, Many Users</h2>
  <p>On a school or lab Linux server, many users share the same machine. Each has a home directory and usually works inside it.</p>
  <pre class="tree"><code>/home/
  ├── user/       ← you (the dojo exercise user)
  ├── alice/      ← another user alice
  └── bob/        ← another user bob</code></pre>
  <p>On macOS, a family Mac works the same way — each person gets something like <code>/Users/name</code>.</p>

  <h2>Files from Different Owners Together</h2>
  <p>In shared folders, files with <strong>different owners</strong> may sit side by side:</p>
  <pre><code>$ ls -l shared/
  -rw-r--r-- 1 user  user  10 Jan  1 10:00 my_report.txt
  -rw-r--r-- 1 alice alice 15 Jan  1 10:00 alice_notes.txt
  -rw-r--r-- 1 bob   bob   12 Jan  1 10:00 bob_data.txt</code></pre>
  <p>Compare <code>whoami</code> (which prints <code>user</code>) with the owner column in <code>ls -l</code> to tell <strong>your</strong> files from <strong>someone else's</strong>.</p>

  <h2>Others' Files Are Often Off Limits</h2>
  <p>Files owned by someone else are often unreadable, unwritable, or undeletable. Before touching a file, compare <code>whoami</code> with the owner column from <code>ls -l</code>.</p>

  <h2>Chapter Summary</h2>
  <table>
    <thead>
      <tr><th>Command / concept</th><th>What it tells you</th></tr>
    </thead>
    <tbody>
      <tr><td><code>whoami</code></td><td>Your current username</td></tr>
      <tr><td><code>ls -l</code> column 3</td><td>Owner</td></tr>
      <tr><td><code>ls -l</code> column 4</td><td>Group</td></tr>
      <tr><td>Multiple users</td><td>Different owners' files can share the same folder</td></tr>
    </tbody>
  </table>

  <h2>Next Chapter — Permissions</h2>
  <p>Beyond the owner, Linux grants access to the group and to everyone else. That is what <strong>permissions</strong> are. In the next chapter you will read <code>rwx</code> and change permissions with <code>chmod</code>.</p>

  <h2>Next Step</h2>
  <p>Run <code>ls -l</code> on the <code>shared</code> folder in the exercise and identify who owns each file!</p>
