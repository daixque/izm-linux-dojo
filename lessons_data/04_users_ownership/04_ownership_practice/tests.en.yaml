initial_filesystem:
  /home/user:
    type: directory
    children:
      workspace:
        type: directory
        owner: user
        group: user
        children:
          my_draft.txt:
            type: file
            content: "This is my draft.\n"
            owner: user
            group: user
          other_person.txt:
            type: file
            content: "Alice's private file.\n"
            owner: alice
            group: alice
            mode: 600

initial_cwd: /home/user

solution_commands:
  - cd workspace
  - whoami
  - ls -l
  - cat my_draft.txt

tests:
  - name: "moved into workspace"
    description: "confirm cd workspace"
    type: cwd
    commands:
      - cd workspace
    expected_cwd: /home/user/workspace

  - name: "can cat my_draft.txt"
    description: "read a file you own"
    type: command_output
    setup_commands:
      - cd workspace
    command: cat my_draft.txt
    expected_output: "This is my draft.\n"

  - name: "other_person.txt is owned by alice"
    description: "identify another user's file with ls -l"
    type: command_output
    setup_commands:
      - cd workspace
    command: ls -l other_person.txt
    expected_output: "-rw------- 1 alice alice   22 Jan  1 10:00 other_person.txt\n"
