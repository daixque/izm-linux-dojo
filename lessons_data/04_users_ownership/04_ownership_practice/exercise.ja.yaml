lesson:
  chapter: "04_users_ownership"
  chapter_number: "04"
  number: "04"
  id: "04_users_ownership/04_ownership_practice"
  title: "オーナーシップによる違いを確認する"

description: "whoami と ls -l を使い、自分のファイルと他人のファイルを見分けます。"

task_description: |
  <p><code>workspace</code> フォルダで <code>whoami</code> と <code>ls -l</code> を使い、自分がオーナーの <code>my_draft.txt</code> の内容を <code>cat</code> で表示しましょう。</p>

instructions:
  - "<code>cd workspace</code> に移動します"
  - "<code>whoami</code> で自分のユーザー名を確認します"
  - "<code>ls -l</code> で各ファイルのオーナーを確認します"
  - "<code>my_draft.txt</code> は自分（<code>user</code>）のファイルです — <code>cat my_draft.txt</code> で内容を表示します"
  - "準備ができたら <strong>テスト</strong> ボタンをクリックしてください"

hints:
  - "<code>other_person.txt</code> のオーナーは <code>alice</code> — 他人のファイルです"
  - "オーナーが <code>user</code> のファイルだけ自由に cat できます（第5章で詳しく）"
  - "うまくいかないときは <strong>リセット</strong> ボタンで最初からやり直せます"
