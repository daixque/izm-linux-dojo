  title: "Checking Ownership"

content: |
  <h2>Chapter 4 Summary</h2>
  <p>In this chapter you learned:</p>
  <ul>
    <li><code>whoami</code> — check your current username</li>
    <li><code>ls -l</code> — read owner (column 3) and group (column 4)</li>
    <li>Multiple users — others' files can appear in the same folder</li>
  </ul>

  <h2>Your Files vs Others' Files</h2>
  <p>Before operating on a file, make a habit of:</p>
  <ol>
    <li>Running <code>whoami</code> to see your username</li>
    <li>Running <code>ls -l</code> to see the file's owner</li>
  </ol>
  <p>Owner matches <code>whoami</code> → usually <strong>your file</strong> (you can often change it freely)<br>
  Owner differs → <strong>someone else's file</strong> (restrictions often apply)</p>

  <h2>Preview of Chapter 5</h2>
  <p>Besides the owner, Linux grants access to the group and everyone else through <strong>permissions</strong>.</p>
  <p>When <code>cat</code> fails on another user's file or <code>touch</code> is refused, permissions are why. Next chapter covers <code>rwx</code> and <code>chmod</code>.</p>

  <h2>Next Step</h2>
  <p>On the exercise page, practice telling your files from others' files!</p>
