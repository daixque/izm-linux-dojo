lesson:
  chapter: "04_users_ownership"
  chapter_number: "04"
  number: "04"
  id: "04_users_ownership/04_ownership_practice"
  title: "Checking Ownership"

description: "Use whoami and ls -l to tell your files from others' files."

task_description: |
  <p>In the <code>workspace</code> folder, use <code>whoami</code> and <code>ls -l</code>, then display your file <code>my_draft.txt</code> with <code>cat</code>.</p>

instructions:
  - "Run <code>cd workspace</code>"
  - "Run <code>whoami</code> to see your username"
  - "Run <code>ls -l</code> to see each file's owner"
  - "<code>my_draft.txt</code> is yours (<code>user</code>) — run <code>cat my_draft.txt</code>"
  - "When ready, click the <strong>Test</strong> button"

hints:
  - "<code>other_person.txt</code> is owned by <code>alice</code> — not yours"
  - "You can freely cat files owned by <code>user</code> (Chapter 5 goes deeper)"
  - "Use the <strong>Reset</strong> button to start over if needed"
