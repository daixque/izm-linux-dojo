lesson:
  chapter: "04_users_ownership"
  chapter_number: "04"
  number: "04"
  id: "04_users_ownership/04_ownership_practice"
  title: "オーナーシップの確認"

content: |
  <h2>第4章のまとめ</h2>
  <p>この章では次のことを学びました。</p>
  <ul>
    <li><code>whoami</code> — 今のユーザー名を確認</li>
    <li><code>ls -l</code> — オーナー（3列目）とグループ（4列目）を読む</li>
    <li>複数ユーザー — 同じフォルダに他人のファイルが混在することがある</li>
  </ul>

  <h2>自分のファイル vs 他人のファイル</h2>
  <p>ファイル操作の前に、次の 2 点を確認する習慣をつけましょう。</p>
  <ol>
    <li><code>whoami</code> で自分のユーザー名を確認する</li>
    <li><code>ls -l</code> で対象ファイルのオーナーを確認する</li>
  </ol>
  <p>オーナーが <code>whoami</code> と同じ → だいたい<strong>自分のファイル</strong>（自由に触れることが多い）<br>
  オーナーが違う → <strong>他人のファイル</strong>（制限があることが多い）</p>

  <h2>第5章への予告</h2>
  <p>オーナー以外にも、「グループ」や「その他のユーザー」に許可を与える仕組みがあります。それが<strong>権限（permissions）</strong>です。</p>
  <p>他人のファイルで <code>cat</code> が失敗したり、<code>touch</code> が拒否されたりするのは、権限のせいです。次の章で <code>rwx</code> と <code>chmod</code> を学びます。</p>

  <h2>次のステップ</h2>
  <p>演習ページで、自分がオーナーのファイルと他人がオーナーのファイルを見分ける練習をしましょう！</p>
