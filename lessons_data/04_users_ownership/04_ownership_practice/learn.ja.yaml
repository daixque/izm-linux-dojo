lesson:
  chapter: "04_users_ownership"
  chapter_number: "04"
  number: "04"
  id: "04_users_ownership/04_ownership_practice"
  title: "オーナーシップの確認"

content: |
  <h2>自分のファイルと他人のファイル</h2>
  <p>ファイルを触る前に、次の 2 点を確認する習慣をつけましょう。</p>
  <ol>
    <li><code>whoami</code> で自分のユーザー名を確認する</li>
    <li><code>ls -l</code> で対象ファイルのオーナー（3 列目）を確認する</li>
  </ol>
  <p>オーナーが <code>whoami</code> と同じ → だいたい<strong>自分のファイル</strong>（自由に触れることが多い）<br>
  オーナーが違う → <strong>他人のファイル</strong>（制限があることが多い）</p>

  <h2>この章のポイント</h2>
  <table>
    <thead>
      <tr><th>コマンド・概念</th><th>内容</th></tr>
    </thead>
    <tbody>
      <tr><td><code>whoami</code></td><td>今のユーザー名を確認</td></tr>
      <tr><td><code>ls -l</code> の 3 列目</td><td>オーナー（持ち主）</td></tr>
      <tr><td><code>ls -l</code> の 4 列目</td><td>グループ</td></tr>
      <tr><td>複数ユーザー</td><td>同じフォルダに他人のファイルが混在することがある</td></tr>
    </tbody>
  </table>

  <h2>次に見ること — 権限</h2>
  <p>オーナー以外にも、「グループ」や「その他のユーザー」に許可を与える仕組みがあります。それが<strong>権限（permissions）</strong>です。</p>
  <p>他人のファイルで <code>cat</code> が失敗したり、<code>touch</code> が拒否されたりするのは、権限のせいです。次の章では <code>rwx</code> の読み方と <code>chmod</code> による変更方法を扱います。</p>

  <h2>次のステップ</h2>
  <p>演習ページで、自分がオーナーのファイルと他人がオーナーのファイルを見分ける練習をしましょう。</p>
