chapters:
  - id: "00_intro"
    number: "00"
    title: "Introduction"
    description: "Understand the terminal and Linux before typing commands"
  - id: "01_dir_and_file"
    number: "01"
    title: "Directories and Files"
    description: "Learn the Linux filesystem and basic commands"
  - id: "02_file_manage"
    number: "02"
    title: "Creating and Managing Files"
    description: "Learn to create, copy, move, and delete files and directories"
  - id: "03_view_text"
    number: "03"
    title: "Viewing File Contents"
    description: "Learn how to view and inspect text files"
  - id: "04_users_ownership"
    number: "04"
    title: "Users and Ownership"
    description: "Learn about users, owners, and groups"
  - id: "05_permissions"
    number: "05"
    title: "File Permissions"
    description: "Learn file permissions with rwx and chmod"
  - id: "06_root_sudo"
    number: "06"
    title: "root and sudo"
    description: "Learn about the root user and privileged operations with sudo"
  - id: "07_search"
    number: "07"
    title: "Search and Filter"
    description: "Learn file search and text filtering with grep and find"
  - id: "08_pipe_redirect"
    number: "08"
    title: "Pipes and Redirects"
    description: "Learn to connect command output with pipes and redirects"
  - id: "09_shell_basics"
    number: "09"
    title: "Shell Basics"
    description: "Learn shell features like command history, Tab completion, and man/--help"
  - id: "10_process"
    number: "10"
    title: "Processes"
    description: "Learn process basics including PIDs, ps, and kill"
  - id: "11_network"
    number: "11"
    title: "Network"
    description: "Learn network command concepts such as curl"
  - id: "12_capstone"
    number: "12"
    title: "Capstone"
    description: "Practice combining everything you've learned in hands-on exercises"
