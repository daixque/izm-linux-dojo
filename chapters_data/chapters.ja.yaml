chapters:
  - id: "00_intro"
    number: "00"
    title: "はじめに"
    description: "ターミナルと Linux の世界を理解します"
  - id: "01_dir_and_file"
    number: "01"
    title: "ディレクトリとファイル"
    description: "Linux のファイルシステムと基本コマンドを学びます"
  - id: "02_file_manage"
    number: "02"
    title: "ファイルの作成と管理"
    description: "ファイル・ディレクトリの作成、コピー、移動、削除を学びます"
  - id: "03_view_text"
    number: "03"
    title: "ファイルの中身を見る"
    description: "テキストファイルの表示・確認方法を学びます"
  - id: "04_users_ownership"
    number: "04"
    title: "ユーザーとオーナーシップ"
    description: "ユーザー、オーナー、グループの概念を学びます"
  - id: "05_permissions"
    number: "05"
    title: "ファイル権限"
    description: "rwx 権限と chmod によるファイル権限を学びます"
  - id: "06_root_sudo"
    number: "06"
    title: "root と sudo"
    description: "root ユーザーと sudo による特権操作を学びます"
  - id: "07_search"
    number: "07"
    title: "検索とフィルタ"
    description: "grep や find によるファイル検索とテキストの抽出を学びます"
  - id: "08_pipe_redirect"
    number: "08"
    title: "パイプとリダイレクト"
    description: "パイプとリダイレクトでコマンド出力をつなげる方法を学びます"
  - id: "09_shell_basics"
    number: "09"
    title: "シェルの便利機能"
    description: "コマンド履歴、Tab 補完、man/--help などシェルの基本機能を学びます"
  - id: "10_process"
    number: "10"
    title: "プロセス"
    description: "プロセス ID や ps、kill などプロセスの基本を学びます"
  - id: "11_capstone"
    number: "11"
    title: "総合演習"
    description: "これまでのコマンドを組み合わせた実践課題に取り組みます"
